<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Yield Strategy Planner</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        body { background-color: #111827; color: #f3f4f6; font-family: ui-sans-serif, system-ui, sans-serif; }
        .bg-card { background-color: #1f2937; }
        .border-custom { border: 1px solid rgba(55, 65, 81, 0.5); }
        .text-emerald { color: #34d399; }
        .text-teal { color: #2dd4bf; }
        .text-purple { color: #c084fc; }
        .text-rose { color: #f43f5e; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen antialiased">

    <div style="max-width: 440px; margin: 0 auto; padding: 16px 12px;">
        
        <header class="flex justify-between items-center mb-4 border-b border-gray-800 pb-2" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; border-bottom: 1px solid #1f2937; padding-bottom: 8px;">
            <div>
                <h1 class="text-lg font-bold text-emerald-400 tracking-tight text-emerald" style="font-size: 1.125rem; font-weight: 700; margin: 0;">Alpha Yield Planner</h1>
                <p style="font-size: 10px; color: #9ca3af; margin: 0;">Interactive Allocation & Hedging Engine</p>
            </div>
            <div style="text-align: right;">
                <span id="payoutDisplay" class="text-lg font-black text-emerald-400 block text-emerald" style="font-size: 1.125rem; font-weight: 900; display: block;">$5,000</span>
                <span id="annualizedWarning" style="font-size: 9px; color: #fbbf24; display: block; font-weight: 500;">~260% simple annual</span>
            </div>
        </header>

        <div class="bg-gray-800 rounded-xl p-3.5 shadow-xl border border-gray-700/50 mb-4 bg-card border-custom" style="border-radius: 12px; padding: 14px; margin-bottom: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);">
            <div style="display: grid; grid-template-cols: repeat(2, minmax(0, 1fr)); gap: 12px; margin-bottom: 14px;">
                <div>
                    <label for="capital" style="display: block; font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase; margin-bottom: 4px;">Capital</label>
                    <div style="position: relative; border-radius: 8px;">
                        <div style="position: absolute; inset-y: 0; left: 0; display: flex; align-items: center; padding-left: 8px; pointer-events: none; height: 100%;">
                            <span style="color: #9ca3af; font-size: 12px;">$</span>
                        </div>
                        <input type="number" id="capital" value="100000" oninput="calculateStrategy()" style="display: block; width: 100%; border-radius: 8px; border: 0; background-color: #374151; padding: 6px 6px 6px 20px; color: white; font-weight: 700; font-size: 12px; box-sizing: border-box;">
                    </div>
                </div>

                <div>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
                        <label for="yieldSlider" style="font-size: 10px; font-weight: 700; color: #9ca3af; text-transform: uppercase;">Yield</label>
                        <span id="yieldValue" class="text-emerald" style="font-size: 12px; font-weight: 900;">5%</span>
                    </div>
                    <div style="display: flex; align-items: center; height: 28px;">
                        <input type="range" id="yieldSlider" min="1" max="10" value="5" step="0.5" oninput="updateSliderValue()" style="width: 100%; cursor: pointer;">
                    </div>
                </div>
            </div>

            <div>
                <button onclick="window.print()" style="width: 100%; background-color: #10b981; color: #111827; font-weight: 700; padding: 8px 16px; border-radius: 8px; font-size: 12px; text-transform: uppercase; border: none; cursor: pointer; text-align: center; display: block; box-sizing: border-box;">
                    Print / Save Plan Copy
                </button>
            </div>
        </div>

        <div id="results" style="display: flex; flex-direction: column; gap: 12px;">
            </div>

    </div>

    <script>
        function updateSliderValue() {
            var slider = document.getElementById('yieldSlider');
            document.getElementById('yieldValue').innerText = slider.value + '%';
            calculateStrategy();
        }

        function calculateStrategy() {
            var capital = parseFloat(document.getElementById('capital').value);
            var targetYieldPercent = parseFloat(document.getElementById('yieldSlider').value);

            if (isNaN(capital) || capital <= 0) {
                document.getElementById('results').innerHTML = '<p style="text-align: center; font-size: 12px; color: #6b7280; font-style: italic;">Please input a valid capital baseline configuration setup.</p>';
                return;
            }

            var totalWeeklyPayout = capital * (targetYieldPercent / 100);
            var annualEquivalent = targetYieldPercent * 52; 

            var fmtCompact = function(val) {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
            };
            
            document.getElementById('payoutDisplay').innerText = fmtCompact(totalWeeklyPayout);
            document.getElementById('annualizedWarning').innerText = '~' + annualEquivalent + '% simple annual';

            // Fixed Structural Ratios Calculations
            var etfPct = 0.55 - (targetYieldPercent * 0.04);
            var stockPct = 0.35 - (targetYieldPercent * 0.01);
            var optionsPct = 0.05 + (targetYieldPercent * 0.04);
            var hedgePct = 0.05 + (targetYieldPercent * 0.01);

            var totalWeight = etfPct + stockPct + optionsPct + hedgePct;
            etfPct /= totalWeight; stockPct /= totalWeight; optionsPct /= totalWeight; hedgePct /= totalWeight;

            var etfPrincipal = capital * etfPct;
            var stockPrincipal = capital * stockPct;
            var optionsPrincipal = capital * optionsPct;
            var hedgePrincipal = capital * hedgePct;

            // Target split matrix ratios
            var etfYieldShare = totalWeeklyPayout * 0.15; 
            var stockYieldShare = totalWeeklyPayout * 0.35;
            var optionsYieldShare = totalWeeklyPayout * 0.50; 

            var htmlBlock = '';

            // Card Asset Balance Breakdown Block
            htmlBlock += '<div class="bg-card border-custom" style="background-color: #1f2937; border-radius: 12px; padding: 14px; border: 1px solid rgba(55,65,81,0.5); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);">';
            htmlBlock += '  <div style="display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px 16px; font-size: 11px;">';
            htmlBlock += '    <div>';
            htmlBlock += '      <div style="display: flex; justify-content: space-between; margin-bottom: 2px;"><span style="color: #9ca3af;">ETFs (Collateral)</span><span class="text-emerald" style="font-weight: 700;">' + fmtCompact(etfPrincipal) + '</span></div>';
            htmlBlock += '      <div style="width: 100%; background-color: #374151; height: 4px; border-radius: 9999px;"><div class="text-emerald" style="background-color: #34d399; height: 4px; border-radius: 9999px; width: ' + (etfPct * 100) + '%"></div></div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <div>';
            htmlBlock += '      <div style="display: flex; justify-content: space-between; margin-bottom: 2px;"><span style="color: #9ca3af;">High-Beta Stocks</span><span class="text-teal" style="font-weight: 700;">' + fmtCompact(stockPrincipal) + '</span></div>';
            htmlBlock += '      <div style="width: 100%; background-color: #374151; height: 4px; border-radius: 9999px;"><div style="background-color: #2dd4bf; height: 4px; border-radius: 9999px; width: ' + (stockPct * 100) + '%"></div></div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <div>';
            htmlBlock += '      <div style="display: flex; justify-content: space-between; margin-bottom: 2px;"><span style="color: #9ca3af;">Spreads Engine</span><span class="text-purple" style="font-weight: 700;">' + fmtCompact(optionsPrincipal) + '</span></div>';
            htmlBlock += '      <div style="width: 100%; background-color: #374151; height: 4px; border-radius: 9999px;"><div style="background-color: #c084fc; height: 4px; border-radius: 9999px; width: ' + (optionsPct * 100) + '%"></div></div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <div>';
            htmlBlock += '      <div style="display: flex; justify-content: space-between; margin-bottom: 2px;"><span style="color: #9ca3af;">Tail-Risk Hedge</span><span class="text-rose" style="font-weight: 700;">' + fmtCompact(hedgePrincipal) + '</span></div>';
            htmlBlock += '      <div style="width: 100%; background-color: #374151; height: 4px; border-radius: 9999px;"><div style="background-color: #f43f5e; height: 4px; border-radius: 9999px; width: ' + (hedgePct * 100) + '%"></div></div>';
            htmlBlock += '    </div>';
            htmlBlock += '  </div>';
            htmlBlock += '</div>';

            // Execution Module Block Setup
            htmlBlock += '<div style="display: flex; flex-direction: column; gap: 8px;">';
            
            // Core Collateral Engine
            htmlBlock += '  <div style="background-color: rgba(31,41,55,0.5); padding: 12px; border-radius: 8px; border: 1px solid rgba(55,65,81,0.3);">';
            htmlBlock += '    <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(55,65,81,0.5); padding-bottom: 6px; margin-bottom: 6px;">';
            htmlBlock += '      <span class="text-emerald" style="font-size: 11px; font-weight: 700; text-transform: uppercase; tracking: 0.05em;">1. Core Collateral (SPY/QQQ)</span>';
            htmlBlock += '      <div style="text-align: right;">';
            htmlBlock += '        <span style="font-size: 12px; font-family: monospace; font-weight: 700; color: #e5e7eb; display: block;">' + fmtCompact(etfPrincipal) + ' Alloc</span>';
            htmlBlock += '        <span class="text-emerald" style="font-size: 10px; font-weight: 700; display: block; margin-top: 2px;">Target: +' + fmtCompact(etfYieldShare) + '/wk</span>';
            htmlBlock += '      </div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <p style="font-size: 11px; color: #d1d5db; margin: 0; line-height: 1.4;">Sell out-of-the-money weekly Covered Calls. Baseline premium anchor with low volatility risk.</p>';
            htmlBlock += '  </div>';

            // High Beta Stock Engine
            htmlBlock += '  <div style="background-color: rgba(31,41,55,0.5); padding: 12px; border-radius: 8px; border: 1px solid rgba(55,65,81,0.3);">';
            htmlBlock += '    <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(55,65,81,0.5); padding-bottom: 6px; margin-bottom: 6px;">';
            htmlBlock += '      <span class="text-teal" style="font-size: 11px; font-weight: 700; text-transform: uppercase; tracking: 0.05em;">2. The Wheel Strategy (NVDA/TSLA)</span>';
            htmlBlock += '      <div style="text-align: right;">';
            htmlBlock += '        <span style="font-size: 12px; font-family: monospace; font-weight: 700; color: #e5e7eb; display: block;">' + fmtCompact(stockPrincipal) + ' Alloc</span>';
            htmlBlock += '        <span class="text-teal" style="font-size: 10px; font-weight: 700; display: block; margin-top: 2px;">Target: +' + fmtCompact(stockYieldShare) + '/wk</span>';
            htmlBlock += '      </div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <p style="font-size: 11px; color: #d1d5db; margin: 0; line-height: 1.4;">Sell 0.20-0.30 Delta weekly Cash-Secured Puts to harvest rich high-beta Implied Volatility (IV) decay.</p>';
            htmlBlock += '  </div>';

            // Spreads Options Engine
            htmlBlock += '  <div style="background-color: rgba(31,41,55,0.5); padding: 12px; border-radius: 8px; border: 1px solid rgba(55,65,81,0.3);">';
            htmlBlock += '    <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(55,65,81,0.5); padding-bottom: 6px; margin-bottom: 6px;">';
            htmlBlock += '      <span class="text-purple" style="font-size: 11px; font-weight: 700; text-transform: uppercase; tracking: 0.05em;">3. Credit Spreads (SPX Index)</span>';
            htmlBlock += '      <div style="text-align: right;">';
            htmlBlock += '        <span style="font-size: 12px; font-family: monospace; font-weight: 700; color: #e5e7eb; display: block;">' + fmtCompact(optionsPrincipal) + ' Alloc</span>';
            htmlBlock += '        <span class="text-purple" style="font-size: 10px; font-weight: 700; display: block; margin-top: 2px;">Target: +' + fmtCompact(optionsYieldShare) + '/wk</span>';
            htmlBlock += '      </div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <p style="font-size: 11px; color: #d1d5db; margin: 0; line-height: 1.4;">Run short-duration (0DTE-3DTE) Bull Put Spreads. High velocity theta decay; heavily drives the premium engine.</p>';
            htmlBlock += '  </div>';

            // Risk Mitigation Defense Insurance
            htmlBlock += '  <div style="background-color: rgba(31,41,55,0.5); padding: 12px; border-radius: 8px; border: 1px solid rgba(55,65,81,0.3); border-left: 2px solid #f43f5e;">';
            htmlBlock += '    <div style="display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid rgba(55,65,81,0.5); padding-bottom: 6px; margin-bottom: 6px;">';
            htmlBlock += '      <span class="text-rose" style="font-size: 11px; font-weight: 700; text-transform: uppercase; tracking: 0.05em;">4. Macro Insurance (VIX / OTM Puts)</span>';
            htmlBlock += '      <div style="text-align: right;">';
            htmlBlock += '        <span style="font-size: 12px; font-family: monospace; font-weight: 700; color: #cbd5e1; display: block;">' + fmtCompact(hedgePrincipal) + ' Budget</span>';
            htmlBlock += '        <span class="text-rose" style="font-size: 10px; font-weight: 700; display: block; margin-top: 2px;">Sunk Cost</span>';
            htmlBlock += '      </div>';
            htmlBlock += '    </div>
