<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alpha Yield Engine</title>
    
    <!-- iOS Home Screen App Configurations -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AlphaYield">
    <link rel="apple-touch-icon" href="icon.png">
    
    <!-- Web App Manifest Link -->
    <link rel="manifest" href="manifest.json">

    <style>
        /* Base Reset & Variables */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #090d16; 
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Mobile App Frame Wrapper */
        .container { 
            max-width: 440px; 
            margin: 0 auto; 
            background-color: #111827; 
            border: 2px solid #334155; 
            border-radius: 16px;
            padding: 16px 14px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7), 0 8px 10px -6px rgba(0, 0, 0, 0.7);
        }
        
        /* Brand Identity Layout */
        .brand-container { display: flex; align-items: center; gap: 10px; }
        .logo-mark {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-weight: 900;
            color: #0f172a;
            font-size: 16px;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Premium Tab Layout Module */
        .tab-navigation {
            display: flex;
            background-color: #1e293b;
            padding: 6px;
            border-radius: 10px;
            margin-bottom: 16px;
            border: 1px solid #475569;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 800;
            cursor: pointer;
            text-align: center;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s ease-in-out;
        }
        .tab-btn.active {
            background-color: #10b981;
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        /* Core Display Content Framework Toggle */
        .tab-content { display: none !important; }
        .tab-content.active { display: block !important; }

        /* Header Utility Styles */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        header { border-bottom: 1px solid #1e293b; padding-bottom: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 18px; font-weight: 700; color: #34d399; }
        .subtitle { font-size: 10px; color: #94a3b8; margin-top: 2px; }
        .grand-payout { font-size: 20px; font-weight: 900; color: #34d399; text-align: right; }
        .annualized-text { font-size: 11px; color: #fbbf24; font-weight: 600; text-align: right; margin-top: 2px; }

        /* Control Panel Styles */
        .control-panel { 
            background-color: #1e293b; 
            border-radius: 12px; 
            padding: 14px; 
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; tracking: 0.05em; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .currency-symbol { position: absolute; left: 8px; color: #94a3b8; font-size: 12px; font-weight: 600; }
        .capital-input { 
            width: 100%; background-color: #334155; border: none; border-radius: 6px; 
            padding: 8px 8px 8px 20px; color: #fff; font-weight: 700; font-size: 13px;
        }
        .select-input {
            width: 100%; background-color: #334155; border: none; border-radius: 6px; 
            padding: 8px; color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
            outline: none; -webkit-appearance: none; appearance: none;
        }
        .yield-slider { width: 100%; margin-top: 8px; cursor: pointer; accent-color: #34d399; }
        .yield-badge { font-size: 13px; font-weight: 900; color: #34d399; }

        /* Action Buttons */
        .action-btn { 
            width: 100%; background-color: #334155; color: #34d399; font-weight: 700; 
            padding: 10px; border-radius: 6px; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 0.05em; border: 1px solid #10b981; cursor: pointer; text-align: center; margin-top: 4px;
        }

        /* Allocations Summary Card Component */
        .card-summary { background-color: #1e293b; border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; font-size: 11px; }
        .progress-container { width: 100%; background-color: #334155; height: 4px; border-radius: 2px; margin-top: 3px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 2px; transition: width 0.2s ease; }
        
        /* Structural Strategy Colors */
        .color-etf { color: #34d399; } .bg-etf { background-color: #34d399; }
        .color-stock { color: #2dd4bf; } .bg-stock { background-color: #2dd4bf; }
        .color-options { color: #c084fc; } .bg-options { background-color: #c084fc; }
        .color-hedge { color: #f43f5e; } .bg-hedge { background-color: #f43f5e; }

        .tactics-container { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .tactic-card { background-color: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .tactic-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #334155; padding-bottom: 6px; margin-bottom: 6px; }
        .tactic-title { font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .tactic-body { font-size: 11px; color: #cbd5e1; line-height: 1.4; }
        .live-ticker-price { font-size: 9px; color: #64748b; font-weight: normal; text-transform: none; }

        /* Scanner Styles Layout Components */
        .scanner-card { background-color: #1e293b; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #64748b; }
        .scan-tag { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        .tag-momentum { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .tag-overbought { background-color: rgba(239, 68, 68, 0.2); color: #f87171; }
        .tag-oversold { background-color: rgba(16, 185, 129, 0.2); color: #34d399; }
        .ai-box { background-color: rgba(99, 102, 241, 0.08); border: 1px dashed rgba(99, 102, 241, 0.3); padding: 8px; border-radius: 6px; margin-top: 8px; font-size: 10.5px; line-height: 1.4; }
        
        /* Execution Blueprint styling module */
        .execution-blueprint {
            background-color: rgba(16, 185, 129, 0.04);
            border: 1px solid rgba(16, 185, 129, 0.2);
            padding: 8px;
            border-radius: 6px;
            margin-top: 6px;
            font-size: 10.5px;
            color: #e2e8f0;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Header Section Component Layer -->
        <header>
            <div class="brand-container">
                <div class="logo-mark">Α</div>
                <div>
                    <h1 class="title">Alpha Yield</h1>
                    <p class="subtitle">Systematic Risk & Allocation Engine</p>
                </div>
            </div>
            <div>
                <div id="payoutDisplay" class="grand-payout">$0 / wk</div>
                <div id="annualizedWarning" class="annualized-text">($0 / yr)</div>
            </div>
        </header>

        <!-- Tab Navigation Bar Layout -->
        <div class="tab-navigation">
            <button id="plannerBtn" class="tab-btn active" onclick="switchTab('planner')">Yield Planner</button>
            <button id="scannerBtn" class="tab-btn" onclick="switchTab('scanner')">Execution Plan</button>
        </div>

        <!-- TAB 1: ALLOCATION YIELD PLANNER -->
        <div id="plannerTab" class="tab-content active">
            <div class="control-panel">
                <div class="grid-2">
                    <div>
                        <label class="input-label" for="capital">Capital</label>
                        <div class="input-wrapper">
                            <span class="currency-symbol">$</span>
                            <input type="number" id="capital" value="100000" oninput="calculateStrategy()" class="capital-input">
                        </div>
                    </div>
                    <div>
                        <label class="input-label" for="horizon">Time Horizon</label>
                        <select id="horizon" onchange="calculateStrategy()" oninput="calculateStrategy()" class="select-input">
                            <option value="weekly" selected>Weekly</option>
                            <option value="biweekly">Biweekly</option>
                            <option value="monthly">Monthly</option>
                        </select>
                    </div>
                </div>
                
                <div style="margin-bottom: 10px;">
                    <div class="flex-between">
                        <label class="input-label">Yield Goal</label>
                        <span id="yieldValue" class="yield-badge">5%</span>
                    </div>
                    <input type="range" id="yieldSlider" min="1" max="10" value="5" step="0.5" oninput="updateSliderValue()" class="yield-slider">
                </div>

                <button onclick="sharePlan()" class="action-btn">Share Strategy Plan</button>
            </div>

            <!-- Yield Target Mount Area -->
            <div id="plannerResults"></div>
        </div>

        <!-- TAB 2: INTEGRATED SCANNER & EXECUTION BLUEPRINT -->
        <div id="scannerTab" class="tab-content">
            <div style="padding: 2px 2px 10px 2px; font-size: 11px; color: #94a3b8; display: flex; justify-content: space-between;">
                <span>Derivatives Market Signal Integrator</span>
                <span id="scanTimestamp" style="color: #10b981; font-weight: 700;">Live Engine Active</span>
            </div>
            <!-- Dynamic Mounting point for scanned tickers layout metrics -->
            <div id="scannerResults">Loading live deployment layouts...</div>
        </div>

    </div>

    <script>
        var spyPrice = 520.00;
        var currentStockAllocationPool = 35000;

        var marketSignals = [
            { symbol: "NVDA", price: 0, change: 0, rsi: 74, volumeRatio: 1.4, state: "OVERBOUGHT", border: "#f43f5e" },
            { symbol: "TSLA", price: 0, change: 0, rsi: 28, volumeRatio: 1.1, state: "OVERSOLD", border: "#10b981" },
            { symbol: "AAPL", price: 0, change: 0, rsi: 58, volumeRatio: 1.9, state: "MOMENTUM", border: "#3b82f6" },
            { symbol: "AMD",  price: 0, change: 0, rsi: 34, volumeRatio: 0.8, state: "OVERSOLD", border: "#10b981" }
        ];

        function switchTab(tabName) {
            var plannerTab = document.getElementById('plannerTab');
            var scannerTab = document.getElementById('scannerTab');
            var plannerBtn = document.getElementById('plannerBtn');
            var scannerBtn = document.getElementById('scannerBtn');

            if (tabName === 'planner') {
                plannerTab.classList.add('active');
                scannerTab.classList.remove('active');
                plannerBtn.classList.add('active');
                scannerBtn.classList.remove('active');
                calculateStrategy();
            } else {
                scannerTab.classList.add('active');
                plannerTab.classList.remove('active');
                scannerBtn.classList.add('active');
                plannerBtn.classList.remove('active');
                runMarketScanner();
            }
        }

        async function fetchMarketPrices() {
            const proxy = "https://corsproxy.io/?";
            try {
                const resSPY = await fetch(proxy + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/SPY'));
                const dataSPY = await resSPY.json();
                if(dataSPY.chart.result[0].meta.regularMarketPrice) {
                    spyPrice = dataSPY.chart.result[0].meta.regularMarketPrice;
                }
                
                for (let asset of marketSignals) {
                    try {
                        const resAsset = await fetch(proxy + encodeURIComponent('https://query1.finance.yahoo.com/v8/finance/chart/' + asset.symbol));
                        const dataAsset = await resAsset.json();
                        asset.price = dataAsset.chart.result[0].meta.regularMarketPrice;
                        asset.change = dataAsset.chart.result[0].meta.chartPreviousClose 
                            ? ((asset.price - dataAsset.chart.result[0].meta.chartPreviousClose) / dataAsset.chart.result[0].meta.chartPreviousClose) * 100 
                            : 0;
                    } catch(innerErr) {
                        asset.price = asset.symbol === "NVDA" ? 125.40 : asset.symbol === "TSLA" ? 178.20 : asset.symbol === "AAPL" ? 192.50 : 152.00;
                    }
                }
                
                if(document.getElementById('plannerTab').classList.contains('active')) {
                    calculateStrategy();
                } else {
                    runMarketScanner();
                }
            } catch (e) {
                console.log("Using fallback core model structures.", e);
            }
        }

        function updateSliderValue() {
            var slider = document.getElementById('yieldSlider');
            document.getElementById('yieldValue').innerText = slider.value + '%';
            calculateStrategy();
        }

        function calculateStrategy() {
            var capital = parseFloat(document.getElementById('capital').value);
            var targetYieldPercent = parseFloat(document.getElementById('yieldSlider').value);
            var horizon = document.getElementById('horizon').value;

            if (isNaN(capital) || capital <= 0) {
                document.getElementById('plannerResults').innerHTML = '<p style="text-align: center; font-size: 12px; color: #64748b; font-style: italic; padding: 20px;">Please enter a valid capital base.</p>';
                return;
            }

            var totalWeeklyPayout = capital * (targetYieldPercent / 100);
            var totalAnnualPayout = totalWeeklyPayout * 52;
            
            var fmtCompact = function(val) {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
            };

            var horizonLabel = "wk";
            var horizonPayout = totalWeeklyPayout;

            if (horizon === "biweekly") {
                horizonLabel = "2wk";
                horizonPayout = totalWeeklyPayout * 2;
            } else if (horizon === "monthly") {
                horizonLabel = "mo";
                horizonPayout = totalWeeklyPayout * (52 / 12);
            }
            
            document.getElementById('payoutDisplay').innerText = fmtCompact(horizonPayout) + ' / ' + horizonLabel;
            document.getElementById('annualizedWarning').innerText = '(' + fmtCompact(totalAnnualPayout) + ' / yr)';

            var etfPct = 0.55 - (targetYieldPercent * 0.04);
            var stockPct = 0.35 - (targetYieldPercent * 0.01);
            var optionsPct = 0.05 + (targetYieldPercent * 0.04);
            var hedgePct = 0.05 + (targetYieldPercent * 0.01);

            var totalWeight = etfPct + stockPct + optionsPct + hedgePct;
            etfPct /= totalWeight; stockPct /= totalWeight; optionsPct /= totalWeight; hedgePct /= totalWeight;

            var etfPrincipal = capital * etfPct;
            var stockPrincipal = capital * stockPct;
            var optionsPrincipal = capital * optionsPct;
            var hedgePrincipal = capital * hedgePct;

            currentStockAllocationPool = stockPrincipal;

            var horizonMultiplier = 1;
            if (horizon === "biweekly") horizonMultiplier = 2;
            if (horizon === "monthly") horizonMultiplier = (52 / 12);

            var etfYieldShare = (totalWeeklyPayout * 0.15) * horizonMultiplier; 
            var stockYieldShare = (totalWeeklyPayout * 0.35) * horizonMultiplier;
            var optionsYieldShare = (totalWeeklyPayout * 0.50) * horizonMultiplier; 

            var requiredSpyCap = spyPrice * 100;
            var canAffordSpy = etfPrincipal >= requiredSpyCap;
            var accessibleSpyShares = Math.floor(etfPrincipal / spyPrice);

            var etfRec = ""; var stockRec = ""; var optionsRec = ""; var hedgeRec = "";

            if (horizon === "weekly") {
                if (canAffordSpy) {
                    etfRec = "Sell 1 out-of-the-money weekly Covered Call contract against " + accessibleSpyShares + " physical cash-held shares of SPY collateral base.";
                } else {
                    etfRec = "Allocation short of 100 physical shares by " + fmtCompact(requiredSpyCap - etfPrincipal) + ". Deploy a <b>Poor Man's Covered Call</b> via a deep ITM LEAPS option contract, or transition to 10 micro-scale <b>XSP Index options</b>.";
                }
                stockRec = "Sell 0.20-0.30 Delta weekly Cash-Secured Puts to harvest rich high-beta Implied Volatility (IV) decay.";
                optionsRec = "Run short-duration (0DTE-3DTE) Bull Put Spreads. High velocity theta decay; heavily drives the premium engine.";
                if (targetYieldPercent <= 4) hedgeRec = "Buy weekly 5% out-of-the-money protective SPY Puts. Low-cost system safety.";
                else if (targetYieldPercent > 4 && targetYieldPercent <= 7) hedgeRec = "Allocate to front-month 30-delta long VIX call contracts to hedge unexpected spikes in volatility.";
                else hedgeRec = "CRITICAL RISK: Buy structural weekly SPX tail-risk Put spreads to offset high-beta volatility.";
            } else if (horizon === "biweekly") {
                if (canAffordSpy) {
                    etfRec = "Sell a 14-day cycle out-of-the-money Covered Call contract against " + accessibleSpyShares + " shares.";
                } else {
                    etfRec = "Short of 100 shares. Buy high-delta LEAPS call and write rolling 14-day contracts against it.";
                }
                stockRec = "Write 14-day Cash-Secured Puts targeting a conservative 0.20 Delta.";
                optionsRec = "Execute 7-14 DTE Credit Spreads on the broad index for more reliable premium insulation.";
                if (targetYieldPercent <= 5) hedgeRec = "Purchase rolling 30-day out-of-the-money puts on index assets.";
                else hedgeRec = "Combine out-of-the-money tracking index puts with small systematic VIX call allocations.";
            } else if (horizon === "monthly") {
                if (canAffordSpy) {
                    etfRec = "Sell standard 30-45 DTE monthly Covered Calls at a 0.15 Delta to maximize passive upside growth.";
                } else {
                    etfRec = "Short of 100 physical shares. Run a clean monthly <b>PMCC strategy</b> using deep ITM LEAPS contracts.";
                }
                stockRec = "Sell 30-45 DTE Cash-Secured Puts on high-quality blue chips during market dips to systematically buy at a discount.";
                optionsRec = "Deploy monthly Iron Condors or multi-week vertical credit spreads to maximize theta inside range bounds.";
                if (targetYieldPercent <= 4) hedgeRec = "Purchase long-term (6-12 month) protective LEAPS put options down 10%. Structural safety.";
                else hedgeRec = "Build systematic 60 DTE long VIX call option structures to absorb systematic corrections.";
            }

            var htmlBlock = '';
            htmlBlock += '<div class="card-summary">';
            htmlBlock += '  <div class="summary-grid">';
            htmlBlock += '    <div><div class="flex-between"><span style="color: #94a3b8;">ETFs (Collateral)</span><span style="font-weight:700;" class="color-etf">' + fmtCompact(etfPrincipal) + '</span></div><div class="progress-container"><div class="progress-bar bg-etf" style="width: ' + (etfPct * 100) + '%"></div></div></div>';
            htmlBlock += '    <div><div class="flex-between"><span style="color: #94a3b8;">High-Beta Stocks</span><span style="font-weight:700;" class="color-stock">' + fmtCompact(stockPrincipal) + '</span></div><div class="progress-container"><div class="progress-bar bg-stock" style="width: ' + (stockPct * 100) + '%"></div></div></div>';
            htmlBlock += '    <div><div class="flex-between"><span style="color: #94a3b8;">Spreads Engine</span><span style="font-weight:700;" class="color-options">' + fmtCompact(optionsPrincipal) + '</span></div><div class="progress-container"><div class="progress-bar bg-options" style="width: ' + (optionsPct * 100) + '%"></div></div></div>';
            htmlBlock += '    <div><div class="flex-between"><span style="color: #94a3b8;">Tail-Risk Hedge</span><span style="font-weight:700;" class="color-hedge">' + fmtCompact(hedgePrincipal) + '</span></div><div class="progress-container"><div class="progress-bar bg-hedge" style="width: ' + (hedgePct * 100) + '%"></div></div></div>';
            htmlBlock += '  </div>';
            htmlBlock += '</div>';

            htmlBlock += '<div class="tactics-container">';
            htmlBlock += '  <div class="tactic-card"><div class="tactic-header"><span class="tactic-title color-etf">1. Core Collateral (SPY) <span class="live-ticker-price">(Live: $' + spyPrice.toFixed(2) + ')</span></span><div style="text-align: right;"><span style="font-size:11px; font-weight:700; color:#f1f5f9;">' + fmtCompact(etfPrincipal) + '</span><span class="color-etf" style="font-size:10px; font-weight:700;">+' + fmtCompact(etfYieldShare) + '/' + horizonLabel + '</span></div></div><p class="tactic-body">' + etfRec + '</p></div>';
            htmlBlock += '  <div class="tactic-card"><div class="tactic-header"><span class="tactic-title color-stock">2. High Beta Strategy</span><div style="text-align: right;"><span style="font-size:11px; font-weight:700; color:#f1f5f9;">' + fmtCompact(stockPrincipal) + '</span><span class="color-stock" style="font-size:10px; font-weight:700;">+' + fmtCompact(stockYieldShare) + '/' + horizonLabel + '</span></div></div><p class="tactic-body">' + stockRec + '</p></div>';
            htmlBlock += '  <div class="tactic-card"><div class="tactic-header"><span class="tactic-title color-options">3. Spreads Engine (SPX)</span><div style="text-align: right;"><span style="font-size:11px; font-weight:700; color:#f1f5f9;">' + fmtCompact(optionsPrincipal) + '</span><span class="color-options" style="font-size:10px; font-weight:700;">+' + fmtCompact(optionsYieldShare) + '/' + horizonLabel + '</span></div></div><p class="tactic-body">' + optionsRec + '</p></div>';
            htmlBlock += '  <div class="tactic-card" style="border-left: 2px solid #f43f5e;"><div class="tactic-header"><span class="tactic-title color-hedge">4. Macro Insurance</span><div style="text-align: right;"><span style="font-size:11px; font-weight:700; color:#cbd5e1;">' + fmtCompact(hedgePrincipal) + '</span><span class="color-hedge" style="font-size:10px; font-weight:700;">Insurance</span></div></div><p class="tactic-body">' + hedgeRec + '</p></div>';
            htmlBlock += '</div>';

            document.getElementById('plannerResults').innerHTML = htmlBlock;
        }

        function runMarketScanner() {
            var html = "";
            var fmtCurrency = function(val) {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
            };

            marketSignals.forEach(function(asset) {
                var badgeClass = "tag-momentum";
                var aiAnalysisText = "";
                var executionBlueprintText = "";
                
                var contractCollateralSize = asset.price > 0 ? asset.price * 100 : 1;
                var maxContractsAllowed = Math.floor(currentStockAllocationPool / contractCollateralSize);
                var maxPhysicalSharesAllowed = asset.price > 0 ? Math.floor(currentStockAllocationPool / asset.price) : 0;

                if (asset.state === "OVERBOUGHT") {
                    badgeClass = "tag-overbought";
                    aiAnalysisText = "<b>Rule Engine AI:</b> Asset RSI is highly extended (" + asset.rsi + "). Topside buying pressure is exhausting. Recommends writing an <b>Out-Of-The-Money Call Credit Spread</b> or executing a defensive <b>Bearish Covered Call</b> setup.";
                    executionBlueprintText = "<b>Execution Blueprint (Using T1 Allocation):</b> With " + fmtCurrency(currentStockAllocationPool) + " allocated to High-Beta positions, write up to <b>" + maxContractsAllowed + " Covered Call contracts</b> against " + (maxContractsAllowed * 100) + " existing shares, or establish a vertical spread ring.";
                } else if (asset.state === "OVERSOLD") {
                    badgeClass = "tag-oversold";
                    aiAnalysisText = "<b>Rule Engine AI:</b> Sudden local liquidations detected (RSI: " + asset.rsi + "). Downside trend fatigue set in. Prime window to sell an out-of-the-money <b>0.25-Delta Cash-Secured Put</b> or deploy a deep ITM <b>LEAPS Call (PMCC)</b>.";
                    executionBlueprintText = "<b>Execution Blueprint (Using T1 Allocation):</b> Sell up to <b>" + maxContractsAllowed + " Cash-Secured Put contracts</b> using " + fmtCurrency(maxContractsAllowed * contractCollateralSize) + " collateral, leaving " + fmtCurrency(currentStockAllocationPool - (maxContractsAllowed * contractCollateralSize)) + " in reserve cash.";
                } else {
                    badgeClass = "tag-momentum";
                    aiAnalysisText = "<b>Rule Engine AI:</b> High volume velocity alert (" + asset.volumeRatio + "x relative base). Trend breakout is fully active. Avoid multi-leg delta neutral grids. Recommends using a near-term <b>Bull Put Vertical Spread</b>.";
                    executionBlueprintText = "<b>Execution Blueprint (Using T1 Allocation):</b> Deploy your " + fmtCurrency(currentStockAllocationPool) + " across momentum vertical spreads, or buy up to <b>" + maxPhysicalSharesAllowed + " straight underlying equity shares</b> to hold delta exposure.";
                }

                var priceDisplay = asset.price > 0 ? "$" + asset.price.toFixed(2) : "Fetching...";
                var changeColor = asset.change >= 0 ? "#34d399" : "#f43f5e";
                var changeSign = asset.change >= 0 ? "+" : "";

                html += '<div class="scanner-card" style="border-left-color: ' + asset.border + '">';
                html += '  <div class="flex-between" style="margin-bottom: 6px;">';
                html += '    <div>';
                html += '      <span style="font-size: 14px; font-weight: 800; color:#fff; margin-right: 6px;">' + asset.symbol + '</span>';
                box_class = badgeClass;
                html += '      <span class="scan-tag ' + badgeClass + '">' + asset.state + '</span>';
                html += '    </div>';
                html += '    <div style="text-align: right;">';
                html += '      <span style="font-size: 13px; font-weight: 700; color:#fff; display:block;">' + priceDisplay + '</span>';
                html += '      <span style="font-size: 10px; font-weight: 700; color:' + changeColor + ';">' + changeSign + asset.change.toFixed(2) + '%</span>';
                html += '    </div>';
                html += '  </div>';
                html += '  <div style="font-size: 10px; color:#94a3b8; display:flex; gap: 14px;">';
                html += '     <span>RSI (14): <b>' + asset.rsi + '</b></span>';
                html += '     <span>Vol Multiplier: <b>' + asset.volumeRatio + 'x</b></span>';
                html += '  </div>';
                html += '  <div class="ai-box">' + aiAnalysisText + '</div>';
                html += '  <div class="execution-blueprint">' + executionBlueprintText + '</div>';
                html += '</div>';
            });

            document.getElementById('scannerResults').innerHTML = html;
            document.getElementById('scanTimestamp').innerText = "Refreshed: " + new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
        }

        function sharePlan() {
            var capital = document.getElementById('capital').value;
            var targetYieldPercent = document.getElementById('yieldValue').innerText;
            var horizon = document.getElementById('horizon').options[document.getElementById('horizon').selectedIndex].text;
            var weeklyPayout = document.getElementById('payoutDisplay').innerText;
            var annualPayout = document.getElementById('annualizedWarning').innerText;

            var shareText = "Alpha Yield Strategy Plan:\n" +
                            "• Capital Base: $" + parseFloat(capital).toLocaleString() + "\n" +
                            "• Time Horizon: " + horizon + "\n" +
                            "• Yield Goal: " + targetYieldPercent + "\n" +
                            "• Expected Revenue: " + weeklyPayout + " " + annualPayout + "\n" +
                            "Generated via Alpha Yield Planner Engine.";

            if (navigator.share) {
                navigator.share({ title: 'Alpha Yield Allocation', text: shareText }).catch(function(e){});
            } else {
                navigator.clipboard.writeText(shareText);
                alert("Plan data copied to clipboard!");
            }
        }

        window.onload = function() {
            calculateStrategy();
            fetchMarketPrices();
            setInterval(fetchMarketPrices, 60000);
        };
    </script>
</body>
</html>
