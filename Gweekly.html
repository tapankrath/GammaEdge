<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Yield Strategy Planner</title>
    <style>
        /* Base Reset & Variables */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #090d16; 
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 12px;
        }
        
        /* Mobile App Frame Wrapper */
        .container { 
            max-width: 440px; 
            margin: 0 auto; 
            background-color: #111827; 
            border: 2px solid #334155; 
            border-radius: 16px;
            padding: 16px 14px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7), 0 8px 10px -6px rgba(0, 0, 0, 0.7);
        }
        
        /* Header Utility Styles */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        header { border-bottom: 1px solid #1e293b; padding-bottom: 12px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 18px; font-weight: 700; color: #34d399; }
        .subtitle { font-size: 10px; color: #94a3b8; margin-top: 2px; }
        .grand-payout { font-size: 20px; font-weight: 900; color: #34d399; text-align: right; }
        .annualized-text { font-size: 11px; color: #fbbf24; font-weight: 600; text-align: right; margin-top: 2px; }

        /* Control Panel Styles */
        .control-panel { 
            background-color: #1e293b; 
            border-radius: 12px; 
            padding: 14px; 
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; tracking: 0.05em; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .currency-symbol { position: absolute; left: 8px; color: #94a3b8; font-size: 12px; font-weight: 600; }
        .capital-input { 
            width: 100%; background-color: #334155; border: none; border-radius: 6px; 
            padding: 8px 8px 8px 20px; color: #fff; font-weight: 700; font-size: 13px;
        }
        .select-input {
            width: 100%; background-color: #334155; border: none; border-radius: 6px; 
            padding: 8px; color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
            outline: none; -webkit-appearance: none; appearance: none;
        }
        .yield-slider { width: 100%; margin-top: 8px; cursor: pointer; accent-color: #34d399; }
        .yield-badge { font-size: 13px; font-weight: 900; color: #34d399; }

        /* Action Buttons */
        .action-btn { 
            width: 100%; background-color: #10b981; color: #0f172a; font-weight: 700; 
            padding: 10px; border-radius: 6px; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 0.05em; border: none; cursor: pointer; text-align: center; margin-top: 4px;
        }
        .action-btn:hover { background-color: #059669; }

        /* Allocations & Strategy Layout Components */
        .card-summary { background-color: #1e293b; border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; font-size: 11px; }
        .progress-container { width: 100%; background-color: #334155; height: 4px; border-radius: 2px; margin-top: 3px; overflow: hidden; }
        .progress-bar { height: 100%; border-radius: 2px; transition: width 0.2s ease; }
        
        /* Specific Engine Colors */
        .color-etf { color: #34d399; } .bg-etf { background-color: #34d399; }
        .color-stock { color: #2dd4bf; } .bg-stock { background-color: #2dd4bf; }
        .color-options { color: #c084fc; } .bg-options { background-color: #c084fc; }
        .color-hedge { color: #f43f5e; } .bg-hedge { background-color: #f43f5e; }

        .tactics-container { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .tactic-card { background-color: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .tactic-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #334155; padding-bottom: 6px; margin-bottom: 6px; }
        .tactic-title { font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .tactic-body { font-size: 11px; color: #cbd5e1; line-height: 1.4; }
        .live-ticker-price { font-size: 9px; color: #64748b; font-weight: normal; text-transform: none; }
    </style>
</head>
<body>

    <div class="container">
        
        <header>
            <div>
                <h1 class="title">Alpha Yield Planner</h1>
                <p class="subtitle">Interactive Allocation & Hedging Engine</p>
            </div>
            <div>
                <div id="payoutDisplay" class="grand-payout">$0 / wk</div>
                <div id="annualizedWarning" class="annualized-text">($0 / yr)</div>
            </div>
        </header>

        <div class="control-panel">
            <div class="grid-2">
                <div>
                    <label class="input-label" for="capital">Capital</label>
                    <div class="input-wrapper">
                        <span class="currency-symbol">$</span>
                        <input type="number" id="capital" value="100000" oninput="calculateStrategy()" class="capital-input">
                    </div>
                </div>
                <div>
                    <label class="input-label" for="horizon">Time Horizon</label>
                    <select id="horizon" onchange="calculateStrategy()" oninput="calculateStrategy()" class="select-input">
                        <option value="weekly" selected>Weekly</option>
                        <option value="biweekly">Biweekly</option>
                        <option value="monthly">Monthly</option>
                    </select>
                </div>
            </div>
            
            <div style="margin-bottom: 10px;">
                <div class="flex-between">
                    <label class="input-label">Yield Goal</label>
                    <span id="yieldValue" class="yield-badge">5%</span>
                </div>
                <input type="range" id="yieldSlider" min="1" max="10" value="5" step="0.5" oninput="updateSliderValue()" class="yield-slider">
            </div>

            <button onclick="sharePlan()" class="action-btn">Share Strategy Plan</button>
        </div>

        <div id="results"></div>

    </div>

    <script>
        var spyPrice = 520.00;

        async function fetchMarketPrices() {
            try {
                const resSPY = await fetch('https://query1.finance.yahoo.com/v8/finance/chart/SPY');
                const dataSPY = await resSPY.json();
                if(dataSPY.chart.result[0].meta.regularMarketPrice) {
                    spyPrice = dataSPY.chart.result[0].meta.regularMarketPrice;
                    calculateStrategy(); 
                }
            } catch (e) {
                console.log("Using baseline fallback price models.", e);
            }
        }

        function updateSliderValue() {
            var slider = document.getElementById('yieldSlider');
            document.getElementById('yieldValue').innerText = slider.value + '%';
            calculateStrategy();
        }

        function calculateStrategy() {
            var capital = parseFloat(document.getElementById('capital').value);
            var targetYieldPercent = parseFloat(document.getElementById('yieldSlider').value);
            var horizon = document.getElementById('horizon').value;

            if (isNaN(capital) || capital <= 0) {
                document.getElementById('results').innerHTML = '<p style="text-align: center; font-size: 12px; color: #64748b; font-style: italic; padding: 20px;">Please enter a valid capital base.</p>';
                return;
            }

            var totalWeeklyPayout = capital * (targetYieldPercent / 100);
            var totalAnnualPayout = totalWeeklyPayout * 52;
            
            var fmtCompact = function(val) {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(val);
            };

            var horizonLabel = "wk";
            var horizonPayout = totalWeeklyPayout;

            if (horizon === "biweekly") {
                horizonLabel = "2wk";
                horizonPayout = totalWeeklyPayout * 2;
            } else if (horizon === "monthly") {
                horizonLabel = "mo";
                horizonPayout = totalWeeklyPayout * (52 / 12);
            }
            
            document.getElementById('payoutDisplay').innerText = fmtCompact(horizonPayout) + ' / ' + horizonLabel;
            document.getElementById('annualizedWarning').innerText = '(' + fmtCompact(totalAnnualPayout) + ' / yr)';

            // Structural Allocation Distribution Logic Matrix
            var etfPct = 0.55 - (targetYieldPercent * 0.04);
            var stockPct = 0.35 - (targetYieldPercent * 0.01);
            var optionsPct = 0.05 + (targetYieldPercent * 0.04);
            var hedgePct = 0.05 + (targetYieldPercent * 0.01);

            var totalWeight = etfPct + stockPct + optionsPct + hedgePct;
            etfPct /= totalWeight; stockPct /= totalWeight; optionsPct /= totalWeight; hedgePct /= totalWeight;

            var etfPrincipal = capital * etfPct;
            var stockPrincipal = capital * stockPct;
            var optionsPrincipal = capital * optionsPct;
            var hedgePrincipal = capital * hedgePct;

            var horizonMultiplier = 1;
            if (horizon === "biweekly") horizonMultiplier = 2;
            if (horizon === "monthly") horizonMultiplier = (52 / 12);

            var etfYieldShare = (totalWeeklyPayout * 0.15) * horizonMultiplier; 
            var stockYieldShare = (totalWeeklyPayout * 0.35) * horizonMultiplier;
            var optionsYieldShare = (totalWeeklyPayout * 0.50) * horizonMultiplier; 

            // Live Calculation Matrix for Covered Calls
            var requiredSpyCap = spyPrice * 100;
            var canAffordSpy = etfPrincipal >= requiredSpyCap;
            var accessibleSpyShares = Math.floor(etfPrincipal / spyPrice);

            var etfRec = "";
            var stockRec = "";
            var optionsRec = "";
            var hedgeRec = "";

            if (horizon === "weekly") {
                if (canAffordSpy) {
                    etfRec = "Sell 1 out-of-the-money weekly Covered Call contract against " + accessibleSpyShares + " physical cash-held shares of SPY collateral base.";
                } else {
                    etfRec = "Allocation short of 100 physical shares by " + fmtCompact(requiredSpyCap - etfPrincipal) + ". Deploy a <b>Poor Man's Covered Call</b> via a deep ITM LEAPS option contract, or transition to 10 micro-scale <b>XSP Index options</b>.";
                }
                stockRec = "Sell 0.20-0.30 Delta weekly Cash-Secured Puts to harvest rich high-beta Implied Volatility (IV) decay.";
                optionsRec = "Run short-duration (0DTE-3DTE) Bull Put Spreads. High velocity theta decay; heavily drives the premium engine.";
                
                // Dynamic Hedging Logic for Weekly
                if (targetYieldPercent <= 4) {
                    hedgeRec = "Buy weekly 5% out-of-the-money protective SPY Puts. Low-cost, passive disaster insurance for a safe profile.";
                } else if (targetYieldPercent > 4 && targetYieldPercent <= 7) {
                    hedgeRec = "Allocate to front-month 30-delta long VIX call contracts to hedge spikes in high-beta stock volatility.";
                } else {
                    hedgeRec = "CRITICAL RISK: Buy back-to-back weekly SPX tail-risk Put spreads. High yield goals expose your cash-secured puts to sharp drawdowns.";
                }

            } else if (horizon === "biweekly") {
                if (canAffordSpy) {
                    etfRec = "Sell a 14-day cycle out-of-the-money Covered Call contract against " + accessibleSpyShares + " shares. Captures mid-term premium acceleration securely.";
                } else {
                    etfRec = "Short of 100 shares. Buy a high-delta LEAPS call option and write rolling 14-day contracts against it to capture safer premium cushions.";
                }
                stockRec = "Write 14-day Cash-Secured Puts targeting a conservative 0.20 Delta. Gives wider breathing room on high-beta names.";
                optionsRec = "Execute 7-14 DTE Credit Spreads on the broad index. Captures more reliable premium cycles over a multi-day trend.";
                
                // Dynamic Hedging Logic for Biweekly
                if (targetYieldPercent <= 5) {
                    hedgeRec = "Purchase rolling 30-day out-of-the-money puts on index assets. Holds its value well against short-duration market slips.";
                } else {
                    hedgeRec = "Combine out-of-the-money tracking puts with small VIX call allocations to buffer your aggressive 14-day high-beta put strategies.";
                }

            } else if (horizon === "monthly") {
                if (canAffordSpy) {
                    etfRec = "Sell standard 30-45 DTE monthly Covered Calls at a 0.15 Delta. Highly passive, defensive setup maximizing upside equity collection.";
                } else {
                    etfRec = "Short of 100 physical shares. Run a clean monthly <b>PMCC strategy</b> using deep ITM calls or deploy systematic monthly XSP index vertical credit spreads.";
                }
                stockRec = "Sell 30-45 DTE Cash-Secured Puts on high-quality blue chips during market dips to systematically initiate long equity exposure.";
                optionsRec = "Deploy monthly Iron Condors or multi-week vertical spreads to profit off broad range-bound consolidation cycles.";
                
                // Dynamic Hedging Logic for Monthly
                if (targetYieldPercent <= 4) {
                    hedgeRec = "Purchase long-term (6-12 month) protective LEAPS put options down 10%. Highly passive, structural safety net.";
                } else if (targetYieldPercent > 4 && targetYieldPercent <= 7) {
                    hedgeRec = "Build systematic 60 DTE long VIX call option structures. Safely shields your broad credit spreads from rapid market trend shifts.";
                } else {
                    hedgeRec = "MAX RISK DEFENSE: Buy systematic 30-45 DTE out-of-the-money SPX put contracts. High leverage requires non-negotiable downside crash insurance.";
                }
            }

            var htmlBlock = '';

            // Card 1: Asset Allocations Summary Block Card
            htmlBlock += '<div class="card-summary">';
            htmlBlock += '  <div class="summary-grid">';
            htmlBlock += '    <div>';
            htmlBlock += '      <div class="flex-between"><span style="color: #94a3b8;">ETFs (Collateral)</span><span style="font-weight:700;" class="color-etf">' + fmtCompact(etfPrincipal) + '</span></div>';
            htmlBlock += '      <div class="progress-container"><div class="progress-bar bg-etf" style="width: ' + (etfPct * 100) + '%"></div></div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <div>';
            htmlBlock += '      <div class="flex-between"><span style="color: #94a3b8;">High-Beta Stocks</span><span style="font-weight:700;" class="color-stock">' + fmtCompact(stockPrincipal) + '</span></div>';
            htmlBlock += '      <div class="progress-container"><div class="progress-bar bg-stock" style="width: ' + (stockPct * 100) + '%"></div></div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <div>';
            htmlBlock += '      <div class="flex-between"><span style="color: #94a3b8;">Spreads Engine</span><span style="font-weight:700;" class="color-options">' + fmtCompact(optionsPrincipal) + '</span></div>';
            htmlBlock += '      <div class="progress-container"><div class="progress-bar bg-options" style="width: ' + (optionsPct * 100) + '%"></div></div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <div>';
            htmlBlock += '      <div class="flex-between"><span style="color: #94a3b8;">Tail-Risk Hedge</span><span style="font-weight:700;" class="color-hedge">' + fmtCompact(hedgePrincipal) + '</span></div>';
            htmlBlock += '      <div class="progress-container"><div class="progress-bar bg-hedge" style="width: ' + (hedgePct * 100) + '%"></div></div>';
            htmlBlock += '    </div>';
            htmlBlock += '  </div>';
            htmlBlock += '</div>';

            // Segment 2: Tactics Playbook Execution Layout Modules
            htmlBlock += '<div class="tactics-container">';
            
            // Engine Card #1 - ETF
            htmlBlock += '  <div class="tactic-card">';
            htmlBlock += '    <div class="tactic-header">';
            htmlBlock += '      <span class="tactic-title color-etf">1. Core Collateral (SPY) <span class="live-ticker-price">(Live: $' + spyPrice.toFixed(2) + ')</span></span>';
            htmlBlock += '      <div style="text-align: right;">';
            htmlBlock += '        <span style="font-size: 11px; font-family: monospace; font-weight: 700; color: #f1f5f9; display: block;">' + fmtCompact(etfPrincipal) + ' Alloc</span>';
            htmlBlock += '        <span class="color-etf" style="font-size: 10px; font-weight: 700; display: block; margin-top: 1px;">Target: +' + fmtCompact(etfYieldShare) + '/' + horizonLabel + '</span>';
            htmlBlock += '      </div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <p class="tactic-body">' + etfRec + '</p>';
            htmlBlock += '  </div>';

            // Engine Card #2 - STOCKS
            htmlBlock += '  <div class="tactic-card">';
            htmlBlock += '    <div class="tactic-header">';
            htmlBlock += '      <span class="tactic-title color-stock">2. High Beta Strategy</span>';
            htmlBlock += '      <div style="text-align: right;">';
            htmlBlock += '        <span style="font-size: 11px; font-family: monospace; font-weight: 700; color: #f1f5f9; display: block;">' + fmtCompact(stockPrincipal) + ' Alloc</span>';
            htmlBlock += '        <span class="color-stock" style="font-size: 10px; font-weight: 700; display: block; margin-top: 1px;">Target: +' + fmtCompact(stockYieldShare) + '/' + horizonLabel + '</span>';
            htmlBlock += '      </div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <p class="tactic-body">' + stockRec + '</p>';
            htmlBlock += '  </div>';

            // Engine Card #3 - OPTIONS
            htmlBlock += '  <div class="tactic-card">';
            htmlBlock += '    <div class="tactic-header">';
            htmlBlock += '      <span class="tactic-title color-options">3. Spreads Engine (SPX Index)</span>';
            htmlBlock += '      <div style="text-align: right;">';
            htmlBlock += '        <span style="font-size: 11px; font-family: monospace; font-weight: 700; color: #f1f5f9; display: block;">' + fmtCompact(optionsPrincipal) + ' Alloc</span>';
            htmlBlock += '        <span class="color-options" style="font-size: 10px; font-weight: 700; display: block; margin-top: 1px;">Target: +' + fmtCompact(optionsYieldShare) + '/' + horizonLabel + '</span>';
            htmlBlock += '      </div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <p class="tactic-body">' + optionsRec + '</p>';
            htmlBlock += '  </div>';

            // Engine Card #4 - HEDGE (NOW DETAILED AND DYNAMIC)
            htmlBlock += '  <div class="tactic-card" style="border-left: 2px solid #f43f5e;">';
            htmlBlock += '    <div class="tactic-header">';
            htmlBlock += '      <span class="tactic-title color-hedge">4. Macro Insurance</span>';
            htmlBlock += '      <div style="text-align: right;">';
            htmlBlock += '        <span style="font-size: 11px; font-family: monospace; font-weight: 700; color: #cbd5e1; display: block;">' + fmtCompact(hedgePrincipal) + ' Budget</span>';
            htmlBlock += '        <span class="color-hedge" style="font-size: 10px; font-weight: 700; display: block; margin-top: 1px;">Sunk Cost</span>';
            htmlBlock += '      </div>';
            htmlBlock += '    </div>';
            htmlBlock += '    <p class="tactic-body">' + hedgeRec + '</p>';
            htmlBlock += '  </div>';

            htmlBlock += '</div>';

            document.getElementById('results').innerHTML = htmlBlock;
        }

        function sharePlan() {
            var capital = document.getElementById('capital').value;
            var targetYieldPercent = document.getElementById('yieldValue').innerText;
            var horizon = document.getElementById('horizon').options[document.getElementById('horizon').selectedIndex].text;
            var weeklyPayout = document.getElementById('payoutDisplay').innerText;
            var annualPayout = document.getElementById('annualizedWarning').innerText;

            var shareText = "Alpha Yield Strategy Plan:\n" +
                            "• Capital Base: $" + parseFloat(capital).toLocaleString() + "\n" +
                            "• Time Horizon: " + horizon + "\n" +
                            "• Yield Goal: " + targetYieldPercent + "\n" +
                            "• Expected Revenue: " + weeklyPayout + " " + annualPayout + "\n" +
                            "Generated via Alpha Yield Planner Engine.";

            if (navigator.share) {
                navigator.share({
                    title: 'Alpha Yield Strategy Allocation',
                    text: shareText
                }).catch(function(err) {
                    console.log("Share cancelled: ", err);
                });
            } else {
                navigator.clipboard.writeText(shareText);
                alert("Plan data copied to clipboard!");
            }
        }

        window.onload = function() {
            calculateStrategy();
            fetchMarketPrices();
        };
    </script>
</body>
</html>
