<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Alpha Yield Engine</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AlphaYield">
    <link rel="apple-touch-icon" href="icon.png">
    
    <link rel="manifest" href="manifest.json">

    <style>
        /* Base Reset & Variables */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #090d16; 
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 12px;
            -webkit-tap-highlight-color: transparent;
            min-height: 100vh;
        }
        
        /* Mobile App Frame Wrapper */
        .container { 
            max-width: 440px; 
            margin: 0 auto; 
            background-color: #111827; 
            border: 2px solid #334155; 
            border-radius: 16px;
            padding: 0 14px 16px 14px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.7), 0 8px 10px -6px rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
        }

        /* Premium Sticky Header Component Layer */
        .sticky-header-container {
            position: sticky;
            top: 0;
            background-color: #111827; 
            z-index: 100;
            padding-top: 12px;
            padding-bottom: 2px;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 14px;
            margin-left: -14px;
            margin-right: -14px;
            padding-left: 14px;
            padding-right: 14px;
        }
        
        /* Brand Identity Layout */
        .brand-container { display: flex; align-items: center; gap: 10px; }
        .logo-mark {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 8px;
            display: grid;
            place-items: center;
            font-weight: 900;
            color: #0f172a;
            font-size: 16px;
            box-shadow: 0 0 12px rgba(16, 185, 129, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        /* Mini Header Refresh Interactive Token Elements */
        .subtitle-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
        .refresh-trigger-btn {
            background-color: #1e293b;
            border: 1px solid #475569;
            color: #34d399;
            font-size: 8.5px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 1.5px 5px;
            border-radius: 4px;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.1s ease-in-out;
        }
        .refresh-trigger-btn:active {
            transform: scale(0.93);
            background-color: #334155;
            border-color: #10b981;
        }

        /* Three Tab Primary Layout Grid */
        .tab-navigation {
            display: flex;
            background-color: #1e293b;
            padding: 4px;
            border-radius: 10px;
            margin-bottom: 12px;
            border: 1px solid #475569;
            gap: 2px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px 0;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 10px;
            font-weight: 800;
            cursor: pointer;
            text-align: center;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.03em;
            transition: all 0.2s ease-in-out;
        }
        .tab-btn.active {
            background-color: #10b981;
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        /* Clean Secondary Sub-Tab Navigation Bar */
        .sub-tab-navigation {
            display: flex;
            background-color: #0f172a;
            padding: 4px;
            border-radius: 8px;
            margin-bottom: 14px;
            border: 1px solid #1e293b;
            gap: 4px;
        }
        .sub-tab-btn {
            flex: 1;
            padding: 7px 0;
            background: none;
            border: none;
            color: #64748b;
            font-size: 10px;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            border-radius: 5px;
            transition: all 0.15s ease-in-out;
        }
        .sub-tab-btn.active {
            background-color: #334155;
            color: #34d399;
        }

        /* Core Display Content Framework Toggle */
        .tab-content { display: none !important; }
        .tab-content.active { display: block !important; }

        /* Header Utility Styles */
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        header { padding-bottom: 12px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .title { font-size: 18px; font-weight: 700; color: #34d399; }
        .subtitle { font-size: 10px; color: #94a3b8; }
        .grand-payout { font-size: 20px; font-weight: 900; color: #34d399; text-align: right; }
        .annualized-text { font-size: 11px; color: #fbbf24; font-weight: 600; text-align: right; margin-top: 2px; }

        /* Control Panel Styles */
        .control-panel { 
            background-color: #1e293b; 
            border-radius: 12px; 
            padding: 14px; 
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
        }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
        .input-label { font-size: 10px; font-weight: 700; color: #94a3b8; text-transform: uppercase; margin-bottom: 4px; display: block; letter-spacing: 0.05em; }
        
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .currency-symbol { position: absolute; left: 8px; color: #94a3b8; font-size: 12px; font-weight: 600; }
        .capital-input { 
            width: 100%; background-color: #334155; border: none; border-radius: 6px; 
            padding: 8px 8px 8px 20px; color: #fff; font-weight: 700; font-size: 13px;
        }
        .select-input {
            width: 100%; background-color: #334155; border: none; border-radius: 6px; 
            padding: 8px; color: #fff; font-weight: 700; font-size: 13px; cursor: pointer;
            outline: none; -webkit-appearance: none; appearance: none;
        }
        .yield-slider { width: 100%; margin-top: 8px; cursor: pointer; accent-color: #34d399; }
        .yield-badge { font-size: 13px; font-weight: 900; color: #34d399; }

        /* Action Buttons */
        .action-btn { 
            width: 100%; background-color: #334155; color: #34d399; font-weight: 700; 
            padding: 10px; border-radius: 6px; font-size: 11px; text-transform: uppercase; 
            letter-spacing: 0.05em; border: 1px solid #10b981; cursor: pointer; text-align: center; margin-top: 4px;
        }

        /* Allocations Summary Card Component */
        .card-summary { background-color: #1e293b; border-radius: 12px; padding: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px 16px; font-size: 11px; }
        
        /* Structural Strategy Colors */
        .color-etf { color: #34d399; } .bg-etf { background-color: #34d399; }
        .color-stock { color: #2dd4bf; } .bg-stock { background-color: #2dd4bf; }
        .color-options { color: #c084fc; } .bg-options { background-color: #c084fc; }
        .color-hedge { color: #f43f5e; } .bg-hedge { background-color: #f43f5e; }

        .tactics-container { display: flex; flex-direction: column; gap: 10px; margin-top: 12px; }
        .tactic-card { background-color: rgba(30, 41, 59, 0.5); padding: 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.03); }
        .tactic-title { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .tactic-body { font-size: 11px; color: #cbd5e1; line-height: 1.4; }

        /* Scanner Execution Layout Plan Modules */
        .pool-badge { background-color: #334155; color: #94a3b8; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; }
        .scanner-card { background-color: #1e293b; border-radius: 10px; padding: 12px; margin-bottom: 10px; border-left: 4px solid #64748b; }
        .scan-tag { padding: 2px 6px; border-radius: 4px; font-size: 9px; font-weight: 800; text-transform: uppercase; }
        
        /* Tactical State Colors */
        .tag-momentum { background-color: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .tag-overbought { background
