<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>OI / Vol / PCR Strip — Test Harness</title>
<style>
  body{font-family:'Inter',-apple-system,sans-serif;background:#e8edf5;color:#0a0f1e;max-width:560px;margin:0 auto;padding:16px;font-size:14px}
  .card{background:#fff;border:1px solid #d7dee9;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
  h2{font-size:13px;text-transform:uppercase;letter-spacing:.12em;margin:0 0 10px;color:#475569}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px}
  button{cursor:pointer;font-family:inherit}
  .tk{padding:8px 16px;border-radius:7px;border:2px solid #cbd5e1;background:#f1f5f9;font-weight:800;font-size:12px;color:#475569}
  .tk.on{border-color:#1d4ed8;background:#eff6ff;color:#1d4ed8}
  .cp{padding:8px 16px;border-radius:7px;border:2px solid #cbd5e1;background:#f1f5f9;font-weight:800;font-size:12px;color:#475569}
  .cp.on-call{border-color:#166534;background:#f0fdf4;color:#166534}
  .cp.on-put{border-color:#b91c1c;background:#fef2f2;color:#b91c1c}
  input{width:64px;padding:8px;border:2px solid #cbd5e1;border-radius:7px;font-size:13px;font-weight:800;font-family:inherit}
  .go{background:#0f172a;color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:12px;font-weight:800}
  #debug{font-size:10px;font-family:monospace;color:#475569;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:10px;white-space:pre-wrap;line-height:1.6;max-height:220px;overflow:auto}
</style>
</head>
<body>

<div class="card">
  <h2>Test Controls (simulates the Signal recommendation)</h2>
  <div class="row">
    <button class="tk on" id="tk-spy" onclick="setTk('SPY')">SPY</button>
    <button class="tk" id="tk-qqq" onclick="setTk('QQQ')">QQQ</button>
    <button class="cp on-call" id="cp-call" onclick="setCp(true)">CALL</button>
    <button class="cp" id="cp-put" onclick="setCp(false)">PUT</button>
    <label style="font-size:11px;font-weight:700">DTE <input type="number" id="dte" value="8" min="0" max="60"/></label>
  </div>
  <button class="go" onclick="run()">▶ Fetch &amp; Render Strip</button>
  <button class="go" style="background:#1d4ed8" onclick="connTest()">\U0001f50c Connectivity Test</button>
  <div style="font-size:10px;color:#64748b;margin-top:8px">Strike auto-selected as ATM (nearest $5 to live spot) — same logic as the Signal tab.</div>
</div>

<div class="card">
  <h2>The strip (what goes into the Signal card)</h2>
  <!-- ▼▼ this div + the JS below are the ONLY things that will be merged into index.html ▼▼ -->
  <div id="g-oi-strip" style="margin-bottom:12px"></div>
  <!-- ▲▲ -->
</div>

<div class="card">
  <h2>Debug log</h2>
  <div id="debug">Idle. Tap Fetch.</div>
</div>

<script>
var TK='SPY', ISCALL=true;
function $(id){return document.getElementById(id);}
function setTk(t){TK=t;$('tk-spy').className='tk'+(t==='SPY'?' on':'');$('tk-qqq').className='tk'+(t==='QQQ'?' on':'');}
function setCp(c){ISCALL=c;$('cp-call').className='cp'+(c?' on-call':'');$('cp-put').className='cp'+(!c?' on-put':'');}
function dbg(m){var d=$('debug');d.textContent+='\n'+m;d.scrollTop=d.scrollHeight;}
function fmtNum(n){if(n==null||isNaN(n))return'—';return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n);}

/* ════════════════════════════════════════════════════════════════
   PORTABLE BLOCK — copy everything between these markers into
   index.html (plus the <div id="g-oi-strip"> container).
   Renders OI / Volume / Put-Call OI ratio for the recommended
   ATM contract, fetched from the Yahoo chain via the same proxy
   cascade index.html already uses.
   ════════════════════════════════════════════════════════════════ */
var OI_STRIP_SEQ=0; // guards against out-of-order responses when user flips ticker fast

function renderOiStrip(sym,K,dte,isCall,color){
  var el=document.getElementById('g-oi-strip');
  if(!el)return;
  var seq=++OI_STRIP_SEQ;
  el.innerHTML='<div style="font-size:9px;color:#374151;text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:6px">Open Interest &amp; Flow \u2014 loading\u2026</div>';

  function fail(msg){
    if(seq!==OI_STRIP_SEQ)return;
    el.innerHTML='<div style="font-size:9px;color:#64748b;font-weight:700;padding:6px 2px">Open Interest &amp; Flow \u2014 '+(msg||'chain unavailable')+'</div>';
    if(typeof dbg==='function')dbg('FAIL: '+msg);
  }
  function fmtN(n){if(n==null||isNaN(n))return'\u2014';return n>=1000000?(n/1000000).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n);}

  // CBOE delayed quotes: free, no key, CORS-enabled \u2014 works without any proxy.
  var cboeUrl='https://cdn.cboe.com/api/global/delayed_quotes/options/'+sym.toUpperCase()+'.json';
  var routes=[
    {u:cboeUrl,n:'cboe direct'},
    {u:'https://api.allorigins.win/raw?url='+encodeURIComponent(cboeUrl),n:'cboe allorigins-raw'},
    {u:'https://api.allorigins.win/get?url='+encodeURIComponent(cboeUrl),n:'cboe allorigins-get',w:true},
    {u:'https://test.cors.workers.dev/?'+encodeURIComponent(cboeUrl),n:'cboe cf-worker'},
    {u:'https://corsproxy.io/?url='+encodeURIComponent(cboeUrl),n:'cboe corsproxy'},
    {u:'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(cboeUrl),n:'cboe codetabs'}
  ];
  function tryRoute(i){
    if(i>=routes.length){fail('CBOE chain unreachable');return;}
    var rt=routes[i];
    var ctrl=typeof AbortController!=='undefined'?new AbortController():null;
    var to=setTimeout(function(){if(ctrl)ctrl.abort();},8000);
    fetch(rt.u,ctrl?{cache:'no-store',signal:ctrl.signal}:{cache:'no-store'})
      .then(function(r){if(!r.ok)throw 0;return r.json();})
      .then(function(j){
        clearTimeout(to);
        if(rt.w){ // allorigins /get wraps payload as {contents:"<json string>"}
          if(!j||!j.contents)throw 0;
          j=JSON.parse(j.contents);
        }
        if(!j||!j.data||!j.data.options||!j.data.options.length)throw 0;
        if(typeof dbg==='function')dbg('  \u2713 via '+rt.n+' ('+j.data.options.length+' contracts)');
        if(seq===OI_STRIP_SEQ)render(j.data);
      })
      .catch(function(err){
        clearTimeout(to);
        if(typeof dbg==='function')dbg('  \u2717 '+rt.n+' \u2014 '+(err&&err.message?err.message:err===0?'bad response/parse':String(err)));
        tryRoute(i+1);
      });
  }
  tryRoute(0);

  function render(data){
    var spot=data.current_price||data.close||data.last_trade_price;
    if(!K&&spot)K=Math.round(spot/5)*5;
    if(typeof dbg==='function')dbg('spot='+spot+'  K='+K);

    // Parse OCC symbols: ROOT + YYMMDD + C/P + strike*1000 (8 digits)
    var re=/^([A-Z]+)(\d{6})([CP])(\d{8})$/;
    var byExp={};
    data.options.forEach(function(o){
      var m=re.exec(o.option);if(!m)return;
      var y=2000+parseInt(m[2].slice(0,2),10),mo=parseInt(m[2].slice(2,4),10)-1,dy=parseInt(m[2].slice(4,6),10);
      var ts=Date.UTC(y,mo,dy,21)/1000; // ~4pm ET expiry
      var rec={type:m[3],strike:parseInt(m[4],10)/1000,oi:o.open_interest||0,vol:o.volume||0};
      (byExp[ts]=byExp[ts]||[]).push(rec);
    });
    var exps=Object.keys(byExp).map(Number).sort(function(a,b){return a-b;});
    if(!exps.length){fail('no parsable contracts');return;}

    var now=Math.floor(Date.now()/1000);
    var targetTs=now+dte*86400;
    var bestExp=exps.reduce(function(b,ts){return Math.abs(ts-targetTs)<Math.abs(b-targetTs)?ts:b;},exps[0]);
    var expLbl=new Date(bestExp*1000).toLocaleDateString('en-US',{month:'short',day:'numeric',timeZone:'UTC'});
    if(typeof dbg==='function')dbg('best expiry: '+expLbl+' ('+Math.max(0,Math.round((bestExp-now)/86400))+'d out, '+byExp[bestExp].length+' contracts)');

    var chain=byExp[bestExp];
    var cOI=0,pOI=0,cV=0,pV=0,best=null,bd=Infinity;
    chain.forEach(function(o){
      if(o.type==='C'){cOI+=o.oi;cV+=o.vol;}else{pOI+=o.oi;pV+=o.vol;}
      if(o.type===(isCall?'C':'P')){var d=Math.abs(o.strike-K);if(d<bd){bd=d;best=o;}}
    });
    if(!best){fail('strike $'+K+' not in chain');return;}
    var pcrOI=cOI>0?(pOI/cOI):null;
    var pcrV=cV>0?(pV/cV):null;
    var oi=best.oi,vol=best.vol;
    var volOi=oi>0?vol/oi:null;
    if(typeof dbg==='function')dbg('contract: $'+best.strike+' '+(isCall?'CALL':'PUT')+'  OI='+oi+'  Vol='+vol+'  PCR(OI)='+(pcrOI!=null?pcrOI.toFixed(2):'\u2014'));

    var oiNote=oi>=10000?'Deep liquidity':oi>=1000?'Liquid':oi>0?'Thin \u2014 watch spreads':'No open interest';
    var volNote=volOi==null?'\u2014':volOi>1?'Hot \u2014 vol exceeds OI':volOi>0.4?'Active today':'Quiet today';
    var pcrNote=pcrOI==null?'\u2014':pcrOI>1.2?'Put-heavy (hedging/bearish)':pcrOI<0.7?'Call-heavy (bullish lean)':'Balanced';
    var pcrAligned=pcrOI==null?null:(isCall?pcrOI<0.7:pcrOI>1.2);
    var c=color||'#0f172a';

    function tile(lbl,val,note,noteColor){
      return '<div style="background:rgba(0,0,0,.06);padding:10px;border-radius:8px">'
        +'<div style="font-size:9px;color:#1e293b;text-transform:uppercase;font-weight:700;letter-spacing:.1em;margin-bottom:4px">'+lbl+'</div>'
        +'<div style="font-size:15px;font-weight:800;color:'+c+'">'+val+'</div>'
        +'<div style="font-size:9px;color:'+(noteColor||'#475569')+';font-weight:600;margin-top:2px">'+note+'</div></div>';
    }
    el.innerHTML=
      '<div style="font-size:9px;color:#374151;text-transform:uppercase;letter-spacing:.12em;font-weight:700;margin-bottom:6px">Open Interest &amp; Flow \u2014 $'+best.strike+' '+(isCall?'CALL':'PUT')+' '+expLbl+' <span style="font-size:8px;background:#dcfce7;color:#15803d;border-radius:3px;padding:1px 4px;font-weight:700;vertical-align:middle;margin-left:2px">CBOE</span></div>'
      +'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">'
      +tile('Open Interest',fmtN(oi),oiNote)
      +tile('Volume Today',fmtN(vol)+(volOi!=null?' <span style="font-size:10px;font-weight:700;opacity:.7">('+volOi.toFixed(1)+'x OI)</span>':''),volNote)
      +tile('P/C OI Ratio',pcrOI!=null?pcrOI.toFixed(2):'\u2014',pcrNote+(pcrAligned===true?' \u2713 aligns':pcrAligned===false?' \u26a0 counter':''),pcrAligned===true?'#15803d':pcrAligned===false?'#b45309':'#475569')
      +'</div>'
      +'<div style="font-size:8px;color:#64748b;font-weight:600;margin-top:4px">P/C ratio across all '+expLbl+' strikes \u00b7 Vol-based PCR '+(pcrV!=null?pcrV.toFixed(2):'\u2014')+' \u00b7 CBOE delayed quotes (~15 min)</div>';
  }
}
/* ════════════ END PORTABLE BLOCK ════════════ */


// Report how the page is being served — file:// blocks all fetches in Safari/iOS
(function(){
  var d=document.getElementById('debug');
  var proto=location.protocol, org=location.origin;
  var msg='Page origin: '+org+' ('+proto+')';
  if(proto==='file:')msg+='\n\u26a0\u26a0 OPENED AS LOCAL FILE \u2014 Safari/iOS block ALL network requests from file:// pages.\n   This alone explains every fetch failure. Host the file or open via a local server.';
  d.textContent=msg+'\nIdle. Tap Fetch or Connectivity Test.';
})();

function connTest(){
  $('debug').textContent='Connectivity test \u2014 origin '+location.origin+' :';
  var targets=[
    ['CBOE chain',      'https://cdn.cboe.com/api/global/delayed_quotes/options/SPY.json'],
    ['Yahoo chart',     'https://query1.finance.yahoo.com/v8/finance/chart/SPY?interval=1d&range=1d'],
    ['Stooq CSV',       'https://stooq.com/q/d/l/?s=spy.us&i=d'],
    ['corsproxy.io',    'https://corsproxy.io/?url='+encodeURIComponent('https://example.com')],
    ['codetabs proxy',  'https://api.codetabs.com/v1/proxy?quest=https://example.com'],
    ['jsdelivr CDN',    'https://cdn.jsdelivr.net/npm/lodash@4.17.21/package.json'],
    ['allorigins raw',  'https://api.allorigins.win/raw?url='+encodeURIComponent('https://cdn.cboe.com/api/global/delayed_quotes/options/SPY.json')],
    ['cf-worker proxy', 'https://test.cors.workers.dev/?'+encodeURIComponent('https://cdn.cboe.com/api/global/delayed_quotes/options/SPY.json')]
  ];
  targets.forEach(function(t){
    var t0=Date.now();
    fetch(t[1],{cache:'no-store'})
      .then(function(r){dbg('  \u2713 '+t[0]+' \u2014 HTTP '+r.status+' ('+(Date.now()-t0)+'ms)');})
      .catch(function(e){dbg('  \u2717 '+t[0]+' \u2014 '+(e&&e.message?e.message:String(e)));});
  });
}

function run(){
  $('debug').textContent='Fetching '+TK+' chain…';
  var dte=parseInt($('dte').value)||8;
  // color matches the signal direction like index.html does
  renderOiStrip(TK,null,dte,ISCALL,ISCALL?'#166534':'#7f1d1d');
}
</script>
</body>
</html>
