<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WeeklyAlpha</title>
<style>
:root{--bg:#090d13;--surf:#0f1621;--card:#141c2a;--bor:#1e2d42;--grn:#00d4a1;--blu:#3b82f6;--yel:#f59e0b;--red:#ef4444;--txt:#e8edf5;--mut:#5a7090;--lbl:#8aa0bc}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,sans-serif;min-height:100vh}

/* HEADER */
header{background:var(--surf);border-bottom:1px solid var(--bor);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--grn),var(--blu));border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.logo-text{font-size:17px;font-weight:700}.logo-text span{color:var(--grn)}
.header-right{display:flex;align-items:center;gap:10px}
.badge{font-size:10px;background:rgba(0,212,161,.12);color:var(--grn);border:1px solid rgba(0,212,161,.25);border-radius:4px;padding:2px 7px;font-family:monospace}

/* GEAR BUTTON */
.gear-btn{width:36px;height:36px;background:var(--card);border:1px solid var(--bor);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .2s;flex-shrink:0}
.gear-btn.active{border-color:var(--grn);background:rgba(0,212,161,.1)}
.gear-dot{width:7px;height:7px;background:var(--grn);border-radius:50%;position:absolute;top:6px;right:6px}
.gear-wrap{position:relative}

/* API DRAWER */
.api-drawer{display:none;position:absolute;top:62px;right:16px;left:16px;background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:16px;z-index:300;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.api-drawer.open{display:block}
.api-drawer .lbl{font-size:11px;font-weight:600;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.api-drawer input{width:100%;background:var(--surf);border:1.5px solid var(--bor);border-radius:8px;padding:11px 12px;color:var(--txt);font-size:13px;outline:none;font-family:monospace}
.api-drawer input:focus{border-color:var(--grn)}
.api-hint{font-size:11px;color:var(--mut);margin-top:6px}
.api-status{font-size:11px;margin-top:6px;font-weight:600}
.api-status.set{color:var(--grn)}.api-status.unset{color:var(--yel)}
.save-btn{margin-top:10px;width:100%;background:var(--grn);border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:700;color:#050d0a;cursor:pointer}

main{max-width:500px;margin:0 auto;padding:20px 16px 80px}
.card{background:var(--card);border:1px solid var(--bor);border-radius:16px;padding:18px;margin-bottom:14px}
.lbl{font-size:11px;font-weight:600;color:var(--mut);letter-spacing:1px;text-transform:uppercase;margin-bottom:10px}
input[type=number]{width:100%;background:var(--surf);border:1.5px solid var(--bor);border-radius:8px;padding:11px 12px;color:var(--txt);font-size:14px;outline:none;-webkit-appearance:none;font-size:26px;font-weight:700;padding:12px 14px 12px 30px;border-radius:10px;font-family:monospace}
.cap-wrap{position:relative;margin-bottom:14px}
.cap-sign{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:20px;color:var(--grn);font-weight:700}
.presets{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.pre-btn{flex:1;min-width:60px;background:var(--surf);border:1px solid var(--bor);border-radius:8px;padding:8px 4px;color:var(--lbl);font-size:12px;cursor:pointer;text-align:center}
.pre-btn.on{background:rgba(0,212,161,.1);border-color:var(--grn);color:var(--grn)}
.risks{display:flex;gap:10px;margin-bottom:16px}
.risk-opt{flex:1;background:var(--surf);border:1.5px solid var(--bor);border-radius:10px;padding:10px 6px;text-align:center;cursor:pointer}
.risk-opt .ri{font-size:20px;margin-bottom:3px}
.risk-opt .rl{font-size:11px;font-weight:600;color:var(--lbl)}
.risk-opt.sel-m{border-color:var(--blu);background:rgba(59,130,246,.1)}.risk-opt.sel-m .rl{color:var(--blu)}
.risk-opt.sel-a{border-color:var(--yel);background:rgba(245,158,11,.1)}.risk-opt.sel-a .rl{color:var(--yel)}
.risk-opt.sel-u{border-color:var(--red);background:rgba(239,68,68,.1)}.risk-opt.sel-u .rl{color:var(--red)}
.gen-btn{width:100%;background:linear-gradient(135deg,#00d4a1,#00b887);border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:700;color:#050d0a;cursor:pointer}
.gen-btn:disabled{background:#1e2d42;color:var(--mut);cursor:not-allowed}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:16px;color:var(--red);font-size:13px;margin-bottom:14px;display:none;line-height:1.6}
#loading{display:none;text-align:center;padding:40px 20px}
.spin{width:40px;height:40px;border:3px solid var(--bor);border-top-color:var(--grn);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
#results{display:none}
.res-hdr{background:linear-gradient(135deg,rgba(0,212,161,.1),rgba(59,130,246,.07));border:1px solid rgba(0,212,161,.2);border-radius:16px;padding:18px;margin-bottom:14px}
.res-title{font-size:11px;color:var(--grn);font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.res-sum{font-size:14px;line-height:1.7}
.alloc{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:14px}
.a-card{background:var(--card);border:1px solid var(--bor);border-radius:12px;padding:13px 10px;text-align:center}
.a-pct{font-family:monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.a-type{font-size:10px;color:var(--lbl);font-weight:600;margin-bottom:3px}
.a-dol{font-family:monospace;font-size:11px;color:var(--mut)}
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:12px}
.met{background:var(--surf);border-radius:9px;padding:10px 12px}
.met-l{font-size:10px;color:var(--mut);font-weight:600;text-transform:uppercase}
.met-v{font-family:monospace;font-size:16px;font-weight:700;margin-top:3px}
.rbar-track{height:6px;background:var(--surf);border-radius:3px;overflow:hidden;margin:6px 0 12px}
.rbar-fill{height:100%;border-radius:3px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin:18px 0 10px}
.sec-dot{width:8px;height:8px;border-radius:50%}
.sec-title{font-size:14px;font-weight:700}

/* COLLAPSIBLE POSITION CARDS */
.pos{background:var(--surf);border:1px solid var(--bor);border-radius:12px;margin-bottom:9px;overflow:hidden}
.pos-header{display:flex;justify-content:space-between;align-items:center;padding:14px 15px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.pos-header-left{display:flex;align-items:center;gap:10px}
.pos-tag{font-size:10px;font-weight:700;border-radius:4px;padding:2px 7px;display:inline-block;flex-shrink:0}
.pos-tick{font-family:monospace;font-size:15px;font-weight:700}
.pos-name-sm{font-size:11px;color:var(--mut);margin-top:1px}
.pos-header-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.pos-dol{font-family:monospace;font-size:14px;font-weight:600}
.pos-chevron{font-size:12px;color:var(--mut);transition:transform .25s}
.pos-chevron.open{transform:rotate(180deg)}
.pos-body{display:none;padding:0 15px 14px;border-top:1px solid var(--bor)}
.pos-body.open{display:block}
.pos-note{font-size:12px;color:var(--lbl);line-height:1.6;padding-top:10px}
.pos-pct-sm{font-size:11px;color:var(--mut)}

/* ACTION BUTTON */
.act-btn{display:inline-block;margin-top:12px;background:var(--grn);color:#050d0a;font-size:12px;font-weight:700;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;letter-spacing:.3px}
.act-btn.put{background:var(--red);color:#fff}
.act-btn.hedge{background:#a78bfa;color:#fff}
.act-btn.etf{background:var(--blu);color:#fff}

.info-card{border-radius:12px;padding:14px 15px;margin-bottom:9px}
.disc{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.15);border-radius:10px;padding:12px 14px;font-size:11px;color:var(--mut);line-height:1.6;margin-top:14px}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Weekly<span>Alpha</span></div>
  </div>
  <div class="header-right">
    <span class="badge">AI PLANNER</span>
    <div class="gear-wrap">
      <div class="gear-btn" id="gearBtn" onclick="toggleGear()">⚙️</div>
    </div>
  </div>
</header>

<!-- API Drawer -->
<div class="api-drawer" id="apiDrawer">
  <div class="lbl">Anthropic API Key</div>
  <input type="password" id="key" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" oninput="updateStatus()">
  <div class="api-hint">🔒 Saved in browser only — never sent anywhere except Anthropic</div>
  <div class="api-status unset" id="apiStatus">⚠️ No key set</div>
  <button class="save-btn" onclick="saveKey()">Save Key</button>
</div>

<main>
  <div class="card">
    <div class="lbl">Capital to Deploy</div>
    <div class="cap-wrap">
      <span class="cap-sign">$</span>
      <input type="number" id="cap" value="100000" min="1000" inputmode="numeric">
    </div>
    <div class="presets">
      <button class="pre-btn" onclick="setC(10000,this)">$10K</button>
      <button class="pre-btn" onclick="setC(25000,this)">$25K</button>
      <button class="pre-btn on" onclick="setC(100000,this)">$100K</button>
      <button class="pre-btn" onclick="setC(250000,this)">$250K</button>
      <button class="pre-btn" onclick="setC(500000,this)">$500K</button>
    </div>
    <div class="lbl">Risk Profile</div>
    <div class="risks">
      <div class="risk-opt" id="rm" onclick="setR('m')"><div class="ri">🛡️</div><div class="rl">Moderate</div></div>
      <div class="risk-opt sel-a" id="ra" onclick="setR('a')"><div class="ri">🔥</div><div class="rl">Aggressive</div></div>
      <div class="risk-opt" id="ru" onclick="setR('u')"><div class="ri">☢️</div><div class="rl">Ultra</div></div>
    </div>
    <button class="gen-btn" id="btn" onclick="go()">⚡ Generate Weekly Plan</button>
  </div>

  <div class="err" id="err"></div>
  <div id="loading"><div class="spin"></div><div style="color:var(--lbl);font-size:14px">Analyzing market conditions…</div></div>
  <div id="results"></div>
</main>

<script>
var selR='a';

// Load saved key on start
window.onload=function(){
  var saved=localStorage.getItem('wa_key');
  if(saved){document.getElementById('key').value=saved;updateStatus()}
  // close drawer on outside tap
  document.addEventListener('click',function(e){
    var drawer=document.getElementById('apiDrawer');
    var gear=document.getElementById('gearBtn');
    if(drawer.classList.contains('open')&&!drawer.contains(e.target)&&!gear.contains(e.target)){
      drawer.classList.remove('open');
      document.getElementById('gearBtn').classList.remove('active');
    }
  });
}

function toggleGear(){
  var d=document.getElementById('apiDrawer');
  var g=document.getElementById('gearBtn');
  d.classList.toggle('open');
  g.classList.toggle('active');
}

function saveKey(){
  var k=document.getElementById('key').value.trim();
  if(k){localStorage.setItem('wa_key',k);updateStatus();toggleGear();}
}

function updateStatus(){
  var k=document.getElementById('key').value.trim();
  var s=document.getElementById('apiStatus');
  if(k&&k.startsWith('sk-ant')){s.textContent='✓ Key ready';s.className='api-status set';}
  else{s.textContent='⚠️ No valid key';s.className='api-status unset';}
}

function setC(v,b){document.getElementById('cap').value=v;document.querySelectorAll('.pre-btn').forEach(function(x){x.classList.remove('on')});b.classList.add('on')}
function setR(r){selR=r;['m','a','u'].forEach(function(x){document.getElementById('r'+x).className='risk-opt'});var map={m:'sel-m',a:'sel-a',u:'sel-u'};document.getElementById('r'+r).classList.add(map[r])}
function fmt(n){n=Number(n)||0;if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';if(n>=1000)return'$'+(n/1000).toFixed(1)+'K';return'$'+Math.round(n).toLocaleString()}

function showErr(m){
  document.getElementById('err').innerHTML='⚠️ '+m;
  document.getElementById('err').style.display='block';
  document.getElementById('loading').style.display='none';
  document.getElementById('btn').disabled=false;
}

function togglePos(id){
  var body=document.getElementById('body-'+id);
  var chev=document.getElementById('chev-'+id);
  if(body.classList.contains('open')){body.classList.remove('open');chev.classList.remove('open');}
  else{body.classList.add('open');chev.classList.add('open');}
}

async function go(){
  var key=(localStorage.getItem('wa_key')||document.getElementById('key').value||'').trim();
  var cap=parseFloat(document.getElementById('cap').value)||100000;
  if(!key){showErr('Tap the ⚙️ gear icon to enter your API key first.');return}
  if(!key.startsWith('sk-ant')){showErr('API key must start with sk-ant-');return}
  document.getElementById('err').style.display='none';
  document.getElementById('results').style.display='none';
  document.getElementById('loading').style.display='block';
  document.getElementById('btn').disabled=true;
  var rnames={m:'Moderate',a:'Aggressive',u:'Ultra'};
  try{
    var resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:3000,
        system:'You are an expert options trader. Respond with ONLY a valid JSON object. Start with { and end with }. No markdown. No backticks. No text before or after.',
        messages:[{role:'user',content:'Generate a weekly trading plan for $'+cap+' capital with '+rnames[selR]+' risk, targeting 5-7% weekly return with hedging. Return JSON with: summary, targetReturn, targetDollar, maxDrawdown, riskScore (1-10), weeklyThesis, exitRules, riskWarning, allocation (etfs/stocks/options/hedge each with pct and dollar), etfPositions, stockPositions, optionPositions, hedgePositions. Each position: ticker, name, dollar, pct, action, rationale. Use SPY QQQ NVDA TSLA AAPL META. Specific option strikes and expiry dates. All dollars sum to '+cap+'.'}]
      })
    });
    var data=await resp.json();
    if(!resp.ok){
      if(resp.status===401)throw new Error('Invalid API key. Tap ⚙️ to update it.');
      if(resp.status===429)throw new Error('Rate limited — wait 30 seconds and retry.');
      throw new Error((data&&data.error&&data.error.message)||'API error '+resp.status);
    }
    var raw='';
    for(var i=0;i<(data.content||[]).length;i++){if(data.content[i].type==='text')raw+=data.content[i].text;}
    raw=raw.trim().replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    var s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s===-1||e===-1)throw new Error('No JSON in response. Try again.');
    var plan;
    try{plan=JSON.parse(raw.substring(s,e+1));}
    catch(pe){throw new Error('Parse error: '+pe.message+'. Try again.');}
    render(plan);
  }catch(err){
    showErr(err.message||'Something went wrong. Try again.');
  }finally{
    document.getElementById('loading').style.display='none';
    document.getElementById('btn').disabled=false;
  }
}

var posIdx=0;
function posCard(p,tickerColor,tagColor,tagBg,btnClass){
  var id='pos'+(posIdx++);
  var actionBtn='<button class="act-btn '+btnClass+'" onclick="alert(\'Action: '+p.action+' '+p.ticker+'\\nAmount: '+fmt(p.dollar)+'\\nCopy ticker to your broker app.\')">▶ Place Trade</button>';
  return '<div class="pos"><div class="pos-header" onclick="togglePos(\''+id+'\')"><div class="pos-header-left"><span class="pos-tag" style="background:'+tagBg+';color:'+tagColor+'">'+p.action+'</span><div><div class="pos-tick" style="color:'+tickerColor+'">'+p.ticker+'</div><div class="pos-name-sm">'+p.name+'</div></div></div><div class="pos-header-right"><div style="text-align:right"><div class="pos-dol">'+fmt(p.dollar)+'</div><div class="pos-pct-sm">'+p.pct+'%</div></div><div class="pos-chevron" id="chev-'+id+'">▼</div></div></div><div class="pos-body" id="body-'+id+'"><div class="pos-note">'+p.rationale+'</div>'+actionBtn+'</div></div>';
}

function render(p){
  posIdx=0;
  var a=p.allocation||{};
  var rs=p.riskScore||7;
  var rc=rs>=8?'#ef4444':rs>=6?'#f59e0b':'#00d4a1';
  var opts=(p.optionPositions||[]).map(function(o){
    var oc=o.action==='CALL'?'#f59e0b':'#ef4444';
    var ob=o.action==='CALL'?'rgba(245,158,11,.12)':'rgba(239,68,68,.12)';
    var bc=o.action==='CALL'?'':'put';
    return posCard(o,'#f59e0b',oc,ob,bc);
  }).join('');

  var h='';
  h+='<div class="res-hdr"><div class="res-title">📋 Weekly Plan · '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div><div class="res-sum">'+(p.summary||'')+'</div></div>';
  h+='<div class="alloc"><div class="a-card"><div class="a-pct" style="color:#3b82f6">'+((a.etfs||{}).pct||0)+'%</div><div class="a-type">ETFs</div><div class="a-dol">'+fmt((a.etfs||{}).dollar)+'</div></div><div class="a-card"><div class="a-pct" style="color:#00d4a1">'+((a.stocks||{}).pct||0)+'%</div><div class="a-type">Stocks</div><div class="a-dol">'+fmt((a.stocks||{}).dollar)+'</div></div><div class="a-card"><div class="a-pct" style="color:#f59e0b">'+((a.options||{}).pct||0)+'%</div><div class="a-type">Options</div><div class="a-dol">'+fmt((a.options||{}).dollar)+'</div></div></div>';
  h+='<div class="card"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--lbl)"><span>Risk Score</span><span style="color:'+rc+';font-family:monospace;font-weight:700">'+rs+'/10</span></div><div class="rbar-track"><div class="rbar-fill" style="width:'+(rs*10)+'%;background:'+rc+'"></div></div><div class="metrics"><div class="met"><div class="met-l">Target Return</div><div class="met-v" style="color:#00d4a1">'+(p.targetReturn||'–')+'</div></div><div class="met"><div class="met-l">Max Drawdown</div><div class="met-v" style="color:#ef4444">'+(p.maxDrawdown||'–')+'</div></div><div class="met"><div class="met-l">Target Profit</div><div class="met-v" style="color:#00d4a1">'+fmt(p.targetDollar)+'</div></div><div class="met"><div class="met-l">Hedge Cushion</div><div class="met-v" style="color:#a78bfa">'+fmt((a.hedge||{}).dollar)+'</div></div></div></div>';

  if((p.etfPositions||[]).length){h+='<div class="sec-hdr"><div class="sec-dot" style="background:#3b82f6"></div><div class="sec-title" style="color:#3b82f6">ETF Positions</div></div>';h+=(p.etfPositions||[]).map(function(pos){return posCard(pos,'#3b82f6','#3b82f6','rgba(59,130,246,.12)','etf')}).join('');}
  if((p.stockPositions||[]).length){h+='<div class="sec-hdr"><div class="sec-dot" style="background:#00d4a1"></div><div class="sec-title" style="color:#00d4a1">Stock Positions</div></div>';h+=(p.stockPositions||[]).map(function(pos){return posCard(pos,'#00d4a1','#00d4a1','rgba(0,212,161,.12)','')}).join('');}
  if((p.optionPositions||[]).length){h+='<div class="sec-hdr"><div class="sec-dot" style="background:#f59e0b"></div><div class="sec-title" style="color:#f59e0b">Options Positions</div></div>';h+=opts;}
  if((p.hedgePositions||[]).length){h+='<div class="sec-hdr"><div class="sec-dot" style="background:#a78bfa"></div><div class="sec-title" style="color:#a78bfa">Hedge Positions</div></div>';h+=(p.hedgePositions||[]).map(function(pos){return posCard(pos,'#a78bfa','#a78bfa','rgba(167,139,250,.12)','hedge')}).join('');}

  if(p.weeklyThesis)h+='<div class="info-card" style="background:#141c2a;border:1px solid rgba(59,130,246,.25)"><span class="pos-tag" style="background:rgba(59,130,246,.12);color:#3b82f6">MACRO THESIS</span><div style="font-size:12px;color:#e8edf5;line-height:1.6;margin-top:8px">'+p.weeklyThesis+'</div></div>';
  if(p.exitRules)h+='<div class="info-card" style="background:#141c2a;border:1px solid rgba(245,158,11,.2)"><span class="pos-tag" style="background:rgba(245,158,11,.12);color:#f59e0b">EXIT RULES</span><div style="font-size:12px;color:#8aa0bc;line-height:1.6;margin-top:8px">'+p.exitRules+'</div></div>';
  h+='<div class="disc"><strong style="color:#ef4444">⚠️ DISCLAIMER:</strong> '+(p.riskWarning||'Options trading involves substantial risk.')+' Not financial advice. You may lose your entire investment.</div>';

  document.getElementById('results').innerHTML=h;
  document.getElementById('results').style.display='block';
  window.scrollTo({top:document.getElementById('results').offsetTop-20,behavior:'smooth'});
}
</script>
</body>
</html>
