<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<title>WeeklyAlpha · GammaEdge</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#e8eef6;color:#09101f;font-family:'Inter',-apple-system,sans-serif;font-size:14px;-webkit-font-smoothing:antialiased;min-height:100vh}
:root{--bg:#e8eef6;--p1:#fff;--p2:#f4f7fb;--bor:#c8d5e8;--text:#09101f;--sub:#475569;--mut:#64748b;--grn:#16a34a;--gbg:#dcfce7;--gbd:#4ade80;--red:#dc2626;--rbg:#fee2e2;--rbd:#f87171;--amb:#d97706;--abg:#fef3c7;--abd:#fbbf24;--blu:#2563eb;--bbg:#dbeafe;--bbd:#60a5fa;--pur:#7c3aed;--pbg:#ede9fe;--pbd:#a78bfa}

/* NAV */
.topbar{background:#0f172a;padding:0;position:sticky;top:0;z-index:100}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px}
.app-title{display:flex;flex-direction:column}
.app-name{font-size:20px;font-weight:900;color:#fff;letter-spacing:-.02em}
.app-name span{color:#a78bfa}
.app-sub{font-size:9px;font-weight:700;color:#64748b;letter-spacing:.1em;text-transform:uppercase;margin-top:1px}
.gear-btn{width:34px;height:34px;background:#1e293b;border:1px solid #334155;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;position:relative;z-index:10;flex-shrink:0}
.back-link{display:inline-flex;align-items:center;gap:5px;color:#94a3b8;font-size:10px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;text-decoration:none;padding:5px 10px 5px 14px}
.nav-pills{display:grid;grid-template-columns:repeat(5,1fr);border-top:1px solid #1e293b}
.nav-pills a{color:#fff;font-size:10px;font-weight:700;text-decoration:none;padding:8px 2px;text-align:center;border-right:1px solid #1e293b}
.nav-pills a:last-child{border-right:none}
.nav-pills a.cur{color:#a78bfa;background:#1e293b}

/* API DRAWER */
.api-drawer{display:none;background:#1e293b;border-top:1px solid #334155;padding:14px}
.api-drawer.open{display:block}
.api-drawer label{display:block;font-size:10px;font-weight:800;color:#94a3b8;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.api-drawer input{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:8px;padding:10px 12px;color:#fff;font-family:monospace;font-size:13px;outline:none;-webkit-appearance:none}
.api-drawer input:focus{border-color:#a78bfa}
.api-hint{font-size:10px;color:#64748b;margin-top:5px}
.api-status{font-size:11px;font-weight:700;margin-top:5px}
.api-status.ok{color:#4ade80}.api-status.no{color:#fbbf24}
.api-save{margin-top:8px;width:100%;background:#a78bfa;border:none;border-radius:8px;padding:10px;font-size:13px;font-weight:800;color:#fff;cursor:pointer}

/* MAIN */
.main{max-width:480px;margin:0 auto;padding:14px 12px 100px}

/* CARD */
.card{background:#fff;border:1.5px solid #c8d5e8;border-radius:14px;padding:16px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.lbl{font-size:10px;font-weight:800;color:#1e293b;letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px}

/* CAPITAL */
.cap-wrap{position:relative;margin-bottom:12px}
.cap-sign{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:20px;font-weight:900;color:#7c3aed}
.cap-input{width:100%;background:#f4f7fb;border:1.5px solid #c8d5e8;border-radius:10px;padding:12px 12px 12px 30px;font-size:26px;font-weight:900;color:#09101f;font-family:'Inter',sans-serif;outline:none;-webkit-appearance:none}
.cap-input:focus{border-color:#7c3aed}

/* PRESETS */
.presets{display:flex;gap:6px;margin-bottom:14px}
.pre{flex:1;background:#f4f7fb;border:1.5px solid #c8d5e8;border-radius:8px;padding:8px 2px;font-size:11px;font-weight:700;color:#475569;text-align:center;cursor:pointer;-webkit-appearance:none;font-family:inherit}
.pre.on{background:#ede9fe;border-color:#7c3aed;color:#7c3aed}

/* TARGET PILL */
.target-pill{display:flex;background:#f4f7fb;border:1.5px solid #c8d5e8;border-radius:10px;overflow:hidden;margin-bottom:14px;cursor:pointer}
.tpill-half{flex:1;padding:10px 12px;border-right:1px solid #c8d5e8;cursor:pointer;background:transparent;border-top:none;border-bottom:none;border-left:none;font-family:inherit;text-align:left}
.tpill-half:last-child{border-right:none}
.tpill-half.set{background:#dcfce7}
.tpill-lbl{font-size:9px;font-weight:800;color:#64748b;letter-spacing:.08em;text-transform:uppercase;margin-bottom:3px}
.tpill-val{font-size:18px;font-weight:900;color:#94a3b8}
.tpill-val.set{color:#16a34a}

/* RISK */
.risks{display:flex;gap:8px;margin-bottom:14px}
.risk{flex:1;background:#f4f7fb;border:1.5px solid #c8d5e8;border-radius:10px;padding:10px 4px;text-align:center;cursor:pointer;-webkit-appearance:none;font-family:inherit}
.risk .ri{font-size:20px;margin-bottom:3px}
.risk .rl{font-size:10px;font-weight:800;color:#475569;letter-spacing:.04em;text-transform:uppercase}
.risk.m{border-color:#2563eb;background:#dbeafe}.risk.m .rl{color:#2563eb}
.risk.a{border-color:#d97706;background:#fef3c7}.risk.a .rl{color:#d97706}
.risk.u{border-color:#dc2626;background:#fee2e2}.risk.u .rl{color:#dc2626}

/* GEN BUTTON */
.gen{width:100%;background:#09101f;color:#fff;border:none;border-radius:10px;padding:16px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;letter-spacing:.02em}
.gen:disabled{background:#94a3b8;cursor:not-allowed}

/* ERROR */
.err{background:#fee2e2;border:1.5px solid #f87171;border-radius:10px;padding:14px;color:#dc2626;font-size:13px;font-weight:600;margin-bottom:12px;display:none;line-height:1.6}

/* LOADING */
.loading{display:none;text-align:center;padding:40px 20px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:36px;height:36px;border:3px solid #c8d5e8;border-top-color:#7c3aed;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
.loading-msg{color:#475569;font-size:13px;font-weight:600}

/* RESULTS */
.results{display:none}
.res-hdr{background:linear-gradient(135deg,#ede9fe,#dbeafe);border:1.5px solid #a78bfa;border-radius:14px;padding:16px;margin-bottom:10px}
.res-tag{font-size:10px;color:#7c3aed;font-weight:800;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.res-sum{font-size:13px;line-height:1.7;color:#1e293b;font-weight:500}
.alloc{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.a-box{background:#fff;border:1.5px solid #c8d5e8;border-radius:12px;padding:12px 8px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.a-pct{font-size:20px;font-weight:900;line-height:1;margin-bottom:2px}
.a-type{font-size:9px;color:#64748b;font-weight:800;letter-spacing:.1em;text-transform:uppercase;margin-bottom:2px}
.a-dol{font-size:11px;color:#475569;font-weight:700}
.mets{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px}
.met{background:#f4f7fb;border-radius:9px;padding:10px 12px;border:1px solid #c8d5e8}
.met-l{font-size:9px;color:#64748b;font-weight:800;text-transform:uppercase;letter-spacing:.08em}
.met-v{font-size:16px;font-weight:900;margin-top:2px}
.rbar{height:5px;background:#f4f7fb;border-radius:3px;overflow:hidden;margin:6px 0 10px;border:1px solid #c8d5e8}
.rbar-fill{height:100%;border-radius:3px}
.sec-hdr{display:flex;align-items:center;gap:8px;margin:16px 0 8px;position:sticky;top:var(--topbar-h,0px);z-index:50;background:#e8eef6;padding:6px 4px;margin-left:-4px;margin-right:-4px;border-radius:8px}
.sec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sec-ttl{font-size:13px;font-weight:900}

/* POSITION CARDS */
.pos{background:#fff;border:1.5px solid #c8d5e8;border-radius:12px;margin-bottom:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.pos-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;gap:8px}
.pos-hl{display:flex;align-items:center;gap:10px;min-width:0;flex:1}
.ptag{font-size:9px;font-weight:900;border-radius:5px;padding:3px 7px;flex-shrink:0;letter-spacing:.06em;text-transform:uppercase}
.ptick{font-size:15px;font-weight:900}
.pname{font-size:10px;color:#64748b;margin-top:1px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pos-hr{display:flex;align-items:center;gap:8px;flex-shrink:0}
.pdol{font-size:14px;font-weight:800}
.ppct{font-size:10px;color:#64748b;font-weight:600}
.chevron{font-size:11px;color:#94a3b8;transition:transform .22s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.pos-body{display:none;padding:0 14px 14px;border-top:1px solid #e2e8f0}
.pos-body.open{display:block}
.pos-note{font-size:12px;color:#475569;line-height:1.6;padding-top:10px;font-weight:500}
.trade-btn{display:inline-flex;align-items:center;gap:5px;margin-top:10px;background:#09101f;color:#fff;font-size:11px;font-weight:800;border:none;border-radius:8px;padding:8px 16px;cursor:pointer;letter-spacing:.04em;text-transform:uppercase;font-family:inherit}

.info-card{background:#fff;border:1.5px solid #c8d5e8;border-radius:12px;padding:14px;margin-bottom:8px}
.info-tag{font-size:9px;font-weight:900;border-radius:5px;padding:3px 8px;display:inline-block;margin-bottom:8px;letter-spacing:.08em;text-transform:uppercase}
.info-body{font-size:12px;color:#475569;line-height:1.6;font-weight:500}

/* ACTION BAR */
.action-bar{display:flex;gap:8px;margin-bottom:12px}
.ab{flex:1;border-radius:9px;padding:10px 6px;font-size:11px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;letter-spacing:.02em;font-family:inherit;border:none}
.ab-save{background:#dcfce7;color:#16a34a;border:1.5px solid #4ade80}
.ab-pdf{background:#09101f;color:#fff}
.ab-clear{background:#fee2e2;color:#dc2626;border:1.5px solid #f87171}

/* SAVED */
.saved-section{margin-bottom:12px}
.saved-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.saved-ttl{font-size:11px;font-weight:800;color:#1e293b;letter-spacing:.06em;text-transform:uppercase}
.saved-toggle{font-size:11px;font-weight:700;color:#475569;background:#f4f7fb;border:1.5px solid #c8d5e8;border-radius:7px;padding:4px 10px;cursor:pointer;font-family:inherit}
.saved-list{display:none}
.saved-list.open{display:block}
.saved-item{background:#fff;border:1.5px solid #c8d5e8;border-radius:10px;padding:11px 14px;margin-bottom:7px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.saved-l{font-size:12px;font-weight:700;color:#1e293b}
.saved-sub{font-size:10px;color:#64748b;margin-top:1px;font-weight:500}
.del{font-size:11px;color:#dc2626;font-weight:700;padding:3px 7px;border-radius:5px;background:#fee2e2;cursor:pointer;border:none;font-family:inherit;margin-right:6px}

/* TARGET MODAL */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:900}
.overlay.open{display:block}
.tmodal{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;padding:24px 20px 44px;z-index:901;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
.tmodal.open{display:block}
.tmodal-lbl{font-size:11px;font-weight:800;color:#64748b;letter-spacing:.1em;text-transform:uppercase;margin-bottom:12px}
.tmodal-wrap{position:relative;margin-bottom:10px}
.tmodal-pre{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:24px;font-weight:900;color:#16a34a}
.tmodal-suf{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:16px;font-weight:700;color:#94a3b8}
.tmodal-input{width:100%;background:#f4f7fb;border:2px solid #16a34a;border-radius:12px;padding:14px 44px;font-size:30px;font-weight:900;color:#09101f;outline:none;font-family:'Inter',sans-serif;-webkit-appearance:none;text-align:center}
.tmodal-calc{font-size:13px;color:#475569;font-weight:600;margin-bottom:18px;min-height:18px;text-align:center}
.tmodal-btns{display:flex;gap:10px}
.tmodal-cancel{flex:1;background:#f4f7fb;border:1.5px solid #c8d5e8;border-radius:10px;padding:13px;font-size:14px;font-weight:800;color:#475569;cursor:pointer;font-family:inherit}
.tmodal-ok{flex:2;background:#09101f;border:none;border-radius:10px;padding:13px;font-size:14px;font-weight:900;color:#fff;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- TOP NAV -->
<div class="topbar">
  <div class="topbar-row1">
    <div class="app-title">
      <div class="app-name">Weekly<span>Alpha</span></div>
      <div class="app-sub">AI Trade Planner</div>
    </div>
    <div class="gear-btn" onclick="toggleGear()">⚙️</div>
  </div>

  <!-- API DRAWER -->
  <div class="api-drawer" id="apiDrawer">
    <label>Anthropic API Key</label>
    <input type="password" id="keyInput" placeholder="sk-ant-api03-..." autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" oninput="updateStatus()">
    <div class="api-hint">🔒 Saved in this browser only</div>
    <div class="api-status no" id="apiStatus">⚠️ No key set</div>
    <button class="api-save" onclick="saveKey()">Save Key & Close</button>
  </div>

  <a href="index.html" class="back-link">← GammaEdge</a>

  <div class="nav-pills">
    <a href="portfolioedge.html">PortfolioAI</a>
    <a href="chartedge.html">ChartAI</a>
    <a href="stockai.html">StockAI</a>
    <a href="EarningsAI.html">EarningsAI</a>
    <a href="MoonshotAI.html">MoonshotAI</a>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main">

  <!-- INPUT CARD -->
  <div class="card">
    <div class="lbl">Capital to Deploy</div>
    <div class="cap-wrap">
      <span class="cap-sign">$</span>
      <input type="number" id="cap" class="cap-input" value="100000" min="1000" inputmode="numeric" oninput="onCapChange()">
    </div>

    <div class="presets">
      <button class="pre" onclick="setC(10000,this)">$10K</button>
      <button class="pre" onclick="setC(25000,this)">$25K</button>
      <button class="pre on" onclick="setC(100000,this)">$100K</button>
      <button class="pre" onclick="setC(250000,this)">$250K</button>
      <button class="pre" onclick="setC(500000,this)">$500K</button>
    </div>

    <div class="lbl">Profit Target <span id="targetBadge" style="font-size:11px;color:#16a34a;font-weight:700;text-transform:none;letter-spacing:0"></span></div>
    <div class="target-pill">
      <button class="tpill-half" id="tpill-pct" onclick="openModal('pct')">
        <div class="tpill-lbl">% Return</div>
        <div class="tpill-val" id="tpct-disp">— %</div>
      </button>
      <button class="tpill-half" id="tpill-dol" onclick="openModal('dol')">
        <div class="tpill-lbl">$ Profit</div>
        <div class="tpill-val" id="tdol-disp">— $</div>
      </button>
    </div>
    <input type="hidden" id="tpct" value="">
    <input type="hidden" id="tdol" value="">

    <div class="lbl">Risk Profile</div>
    <div class="risks">
      <button class="risk" id="risk-m" onclick="setR('m')"><div class="ri">🛡️</div><div class="rl">Moderate</div></button>
      <button class="risk a" id="risk-a" onclick="setR('a')"><div class="ri">🔥</div><div class="rl">Aggressive</div></button>
      <button class="risk" id="risk-u" onclick="setR('u')"><div class="ri">☢️</div><div class="rl">Ultra</div></button>
    </div>

    <button class="gen" id="genBtn" onclick="go()">⚡ Generate Weekly Plan</button>
  </div>

  <!-- SAVED PLANS -->
  <div class="saved-section" id="savedSection" style="display:none">
    <div class="saved-hdr">
      <span class="saved-ttl">📂 Saved Plans</span>
      <button class="saved-toggle" onclick="toggleSaved()">▾ Show</button>
    </div>
    <div class="saved-list" id="savedList"></div>
  </div>

  <!-- ERROR -->
  <div class="err" id="errBox"></div>

  <!-- LOADING -->
  <div class="loading" id="loadingBox">
    <div class="spinner"></div>
    <div class="loading-msg" id="loadingMsg">Generating plan… (20–40 sec)</div>
  </div>

  <!-- ACTION BAR (shown after plan) -->
  <div class="action-bar" id="actionBar" style="display:none">
    <button class="ab ab-save" onclick="doSave()">💾 Save</button>
    <button class="ab ab-pdf" onclick="doPDF()">📄 PDF</button>
    <button class="ab ab-clear" onclick="doClear()">✕ Clear</button>
  </div>

  <!-- RESULTS -->
  <div class="results" id="resultsBox"></div>

</div>

<!-- TARGET MODAL -->
<div class="overlay" id="overlay" onclick="closeModal()"></div>
<div class="tmodal" id="tmodal">
  <div class="tmodal-lbl" id="tmodal-lbl">Set % Return Target</div>
  <div class="tmodal-wrap">
    <span class="tmodal-pre" id="tmodal-pre"></span>
    <input type="number" id="tmodal-in" class="tmodal-input" inputmode="decimal" placeholder="0" oninput="onModalInput()">
    <span class="tmodal-suf" id="tmodal-suf"></span>
  </div>
  <div class="tmodal-calc" id="tmodal-calc"></div>
  <div class="tmodal-btns">
    <button class="tmodal-cancel" onclick="closeModal()">Cancel</button>
    <button class="tmodal-ok" onclick="confirmTarget()">Set Target ✓</button>
  </div>
</div>

<script>
var selR='a';
var _tmode='pct';
var _plan=null;

// ── TOPBAR HEIGHT ──
function setTopbarH(){
  var h=document.querySelector('.topbar').getBoundingClientRect().height;
  document.documentElement.style.setProperty('--topbar-h',h+'px');
}
// also update when gear drawer opens/closes
var _origToggleGear;

// ── INIT ──
window.addEventListener('load',function(){
  setTopbarH();
  window.addEventListener('resize',setTopbarH);
  var k=localStorage.getItem('wa_key');
  if(k){document.getElementById('keyInput').value=k;updateStatus();}
  renderSaved();
  var cap=parseFloat(document.getElementById('cap').value)||100000;
  var dol=Math.round(cap*0.05);
  document.getElementById('tpct').value=5;
  document.getElementById('tdol').value=dol;
  document.getElementById('tpct-disp').textContent='5%';
  document.getElementById('tdol-disp').textContent='$'+dol.toLocaleString();
  document.getElementById('tpct-disp').className='tpill-val set';
  document.getElementById('tdol-disp').className='tpill-val set';
  document.getElementById('tpill-pct').classList.add('set');
  document.getElementById('tpill-dol').classList.add('set');
});

// ── GEAR / API ──
function toggleGear(){
  document.getElementById('apiDrawer').classList.toggle('open');
  setTimeout(setTopbarH,50);
}
function saveKey(){
  var k=document.getElementById('keyInput').value.trim();
  if(k)localStorage.setItem('wa_key',k);
  updateStatus();
  document.getElementById('apiDrawer').classList.remove('open');
}
function updateStatus(){
  var k=document.getElementById('keyInput').value.trim();
  var s=document.getElementById('apiStatus');
  if(k&&k.startsWith('sk-ant')){s.textContent='✓ Key ready';s.className='api-status ok';}
  else{s.textContent='⚠️ No valid key';s.className='api-status no';}
}

// ── CAPITAL ──
function setC(v,btn){
  document.getElementById('cap').value=v;
  document.querySelectorAll('.pre').forEach(function(b){b.classList.remove('on');});
  btn.classList.add('on');
  syncDolFromPct();
}
function onCapChange(){syncDolFromPct();}
function syncDolFromPct(){
  var cap=parseFloat(document.getElementById('cap').value)||0;
  var pct=parseFloat(document.getElementById('tpct').value)||0;
  if(pct>0&&cap>0){
    var dol=Math.round(cap*pct/100);
    document.getElementById('tdol').value=dol;
    document.getElementById('tdol-disp').textContent='$'+dol.toLocaleString();
    document.getElementById('tdol-disp').className='tpill-val set';
    document.getElementById('tpill-dol').classList.add('set');
  }
}

// ── RISK ──
function setR(r){
  selR=r;
  ['m','a','u'].forEach(function(x){
    var el=document.getElementById('risk-'+x);
    el.className='risk';
  });
  document.getElementById('risk-'+r).className='risk '+r;
}

// ── TARGET MODAL ──
function openModal(mode){
  _tmode=mode;
  var cap=parseFloat(document.getElementById('cap').value)||100000;
  var cur=parseFloat(document.getElementById(mode==='pct'?'tpct':'tdol').value)||0;
  document.getElementById('tmodal-lbl').textContent=mode==='pct'?'Set % Return Target':'Set $ Profit Target';
  document.getElementById('tmodal-pre').textContent=mode==='dol'?'$':'';
  document.getElementById('tmodal-suf').textContent=mode==='pct'?'%':'';
  document.getElementById('tmodal-in').value=cur||'';
  document.getElementById('tmodal-calc').textContent='';
  document.getElementById('overlay').classList.add('open');
  document.getElementById('tmodal').classList.add('open');
  setTimeout(function(){document.getElementById('tmodal-in').focus();},150);
  onModalInput();
}
function onModalInput(){
  var cap=parseFloat(document.getElementById('cap').value)||100000;
  var val=parseFloat(document.getElementById('tmodal-in').value)||0;
  var el=document.getElementById('tmodal-calc');
  if(!val){el.textContent='';return;}
  if(_tmode==='pct'){
    el.textContent='= $'+Math.round(cap*val/100).toLocaleString()+' profit on $'+cap.toLocaleString();
  } else {
    el.textContent='= '+(val/cap*100).toFixed(1)+'% return on $'+cap.toLocaleString();
  }
}
function confirmTarget(){
  var cap=parseFloat(document.getElementById('cap').value)||100000;
  var val=parseFloat(document.getElementById('tmodal-in').value)||0;
  if(val>0){
    if(_tmode==='pct'){
      var dol=Math.round(cap*val/100);
      document.getElementById('tpct').value=val;
      document.getElementById('tdol').value=dol;
      document.getElementById('tpct-disp').textContent=val+'%';
      document.getElementById('tdol-disp').textContent='$'+dol.toLocaleString();
    } else {
      var pct=parseFloat((val/cap*100).toFixed(1));
      document.getElementById('tdol').value=val;
      document.getElementById('tpct').value=pct;
      document.getElementById('tdol-disp').textContent='$'+val.toLocaleString();
      document.getElementById('tpct-disp').textContent=pct+'%';
    }
    document.getElementById('tpct-disp').className='tpill-val set';
    document.getElementById('tdol-disp').className='tpill-val set';
    document.getElementById('tpill-pct').classList.add('set');
    document.getElementById('tpill-dol').classList.add('set');
  }
  closeModal();
}
function closeModal(){
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('tmodal').classList.remove('open');
}

// ── HELPERS ──
function fmt(n){
  n=Number(n)||0;
  if(n>=1e6)return'$'+(n/1e6).toFixed(2)+'M';
  if(n>=1000)return'$'+(n/1000).toFixed(1)+'K';
  return'$'+Math.round(n).toLocaleString();
}

  var el=document.getElementById('errBox');

// ── SAVED PLANS ──
function getSaved(){try{return JSON.parse(localStorage.getItem('wa_plans')||'[]');}catch{return[];}}
function renderSaved(){
  var plans=getSaved();
  var sec=document.getElementById('savedSection');
  if(!plans.length){sec.style.display='none';return;}
  sec.style.display='block';
  document.getElementById('savedList').innerHTML=plans.map(function(p){
    return '<div class="saved-item" onclick="loadSaved('+p.id+')">'
      +'<div><div class="saved-l">'+p.date+' · '+fmt(p.cap)+' · '+(p.targetReturn||'')+'</div>'
      +'<div class="saved-sub">'+p.summary+'…</div></div>'
      +'<div style="display:flex;align-items:center">'
      +'<button class="del" onclick="event.stopPropagation();delSaved('+p.id+')">✕</button>'
      +'<span style="color:#94a3b8;font-size:16px">›</span></div></div>';
  }).join('');
}
function loadSaved(id){
  var p=getSaved().find(function(x){return x.id===id;});
  if(p){_plan=p.plan;render(p.plan);document.getElementById('actionBar').style.display='flex';}
}
function delSaved(id){
  localStorage.setItem('wa_plans',JSON.stringify(getSaved().filter(function(x){return x.id!==id;})));
  renderSaved();
}
function toggleSaved(){
  var el=document.getElementById('savedList');
  var btn=el.parentElement.querySelector('.saved-toggle');
  if(el.classList.contains('open')){el.classList.remove('open');btn.textContent='▾ Show';}
  else{el.classList.add('open');btn.textContent='▴ Hide';}
}

// ── GENERATE ──
async function go(){
  var key=(localStorage.getItem('wa_key')||document.getElementById('keyInput').value||'').trim();
  if(!key){showErr('Tap ⚙️ at the top to enter your Anthropic API key.');return;}
  if(!key.startsWith('sk-ant')){showErr('API key must start with sk-ant-');return;}
  var cap=parseFloat(document.getElementById('cap').value)||100000;
  var tpct=parseFloat(document.getElementById('tpct').value)||0;
  var tdol=parseFloat(document.getElementById('tdol').value)||(cap*0.06);
  var rnames={m:'Moderate',a:'Aggressive',u:'Ultra'};
  document.getElementById('errBox').style.display='none';
  document.getElementById('resultsBox').style.display='none';
  document.getElementById('actionBar').style.display='none';
  document.getElementById('loadingBox').style.display='block';
  document.getElementById('genBtn').disabled=true;

  var makePrompt=function(){
    var today=new Date();
    var todayStr=today.toISOString().slice(0,10);
    var nextFri=new Date(today);
    nextFri.setDate(today.getDate()+(5-today.getDay()+7)%7||7);
    var nextFriStr=nextFri.toISOString().slice(0,10);
    var fri4w=new Date(today);
    fri4w.setDate(today.getDate()+((5-today.getDay()+7)%7||7)+21);
    var fri4wStr=fri4w.toISOString().slice(0,10);
    return 'Today is '+todayStr+'. Generate a weekly trading plan for the week starting '+todayStr+'. Capital: $'+cap+'. Risk: '+rnames[selR]+'.'
      +(tpct>0?' Profit target: '+tpct+'% ($'+Math.round(tdol)+').':' Target 5-7% weekly return.')
      +' Include hedging. Return a JSON object with these fields:'
      +' summary(string), targetReturn(string like "6%"), targetDollar(number), maxDrawdown(string), riskScore(number 1-10),'
      +' weeklyThesis(string), exitRules(string), riskWarning(string),'
      +' allocation with etfs/stocks/options/hedge each having pct(number) and dollar(number),'
      +' etfPositions array, stockPositions array, optionPositions array, hedgePositions array.'
      +' Each position: ticker, name, dollar, pct, action, rationale(keep under 120 chars).'
      +' Use tickers: SPY QQQ NVDA TSLA AAPL META AMZN. Option expiry dates must be between '+nextFriStr+' and '+fri4wStr+' — use ONLY future dates relative to today '+todayStr+'.'
      +' All dollars must sum to '+cap+'.';
  };

  var callAPI=async function(prompt){
    var r=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:4000,
        system:'You are an expert options trader. Today is '+todayStr+'. All option expiry dates you generate must be AFTER '+todayStr+' — never use past dates. Output ONLY a JSON object. Start with { and end with }. No markdown, no backticks, no explanation text.',
        messages:[{role:'user',content:prompt}]})
    });
    var d=await r.json();
    if(!r.ok){
      if(r.status===401)throw new Error('Invalid API key. Tap ⚙️ to fix it.');
      if(r.status===429)throw new Error('Rate limited — wait 30 seconds.');
      throw new Error(d?.error?.message||'API error '+r.status);
    }
    return (d.content||[]).map(function(x){return x.type==='text'?x.text:'';}).join('').trim();
  };

  var parseIt=function(raw){
    raw=raw.replace(/^```json\s*/i,'').replace(/^```\s*/,'').replace(/\s*```$/,'').trim();
    var s=raw.indexOf('{'),e=raw.lastIndexOf('}');
    if(s===-1||e===-1)throw new Error('no_json');
    return JSON.parse(raw.substring(s,e+1));
  };

  try{
    document.getElementById('loadingMsg').textContent='Generating plan… (20–40 sec)';
    var raw=await callAPI(makePrompt());
    var plan;
    try{plan=parseIt(raw);}
    catch(e){
      document.getElementById('loadingMsg').textContent='Retrying…';
      var raw2=await callAPI(makePrompt()+' Keep all rationale fields under 80 characters.');
      plan=parseIt(raw2);
    }
    _plan=plan;
    render(plan);
    document.getElementById('actionBar').style.display='flex';
  }catch(e){
    showErr(e.message||'Something went wrong. Try again.');
  }finally{
    document.getElementById('loadingBox').style.display='none';
    document.getElementById('loadingMsg').textContent='Generating plan… (20–40 sec)';
    document.getElementById('genBtn').disabled=false;
  }
}

// ── RENDER ──
var _pidx=0;
function togglePos(id){
  document.getElementById('pb-'+id).classList.toggle('open');
  document.getElementById('pc-'+id).classList.toggle('open');
}
function posCard(p,tc,tagC,tagBg){
  var id='p'+(++_pidx);
  return '<div class="pos">'
    +'<div class="pos-hdr" onclick="togglePos(\''+id+'\')">'
    +'<div class="pos-hl">'
    +'<span class="ptag" style="background:'+tagBg+';color:'+tagC+'">'+p.action+'</span>'
    +'<div><div class="ptick" style="color:'+tc+'">'+p.ticker+'</div>'
    +'<div class="pname">'+p.name+'</div></div></div>'
    +'<div class="pos-hr">'
    +'<div style="text-align:right"><div class="pdol">'+fmt(p.dollar)+'</div>'
    +'<div class="ppct">'+p.pct+'%</div></div>'
    +'<div class="chevron" id="pc-'+id+'">▼</div>'
    +'</div></div>'
    +'<div class="pos-body" id="pb-'+id+'">'
    +'<div class="pos-note">'+p.rationale+'</div>'
    +'</div></div>';
}

function render(p){
  _pidx=0;
  var a=p.allocation||{};
  var rs=Number(p.riskScore)||7;
  var rc=rs>=8?'#dc2626':rs>=6?'#d97706':'#16a34a';
  var h='';

  h+='<div class="res-hdr"><div class="res-tag">📋 Weekly Plan · '+new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})+'</div><div class="res-sum">'+(p.summary||'')+'</div></div>';

  h+='<div class="alloc">';
  h+='<div class="a-box"><div class="a-pct" style="color:#2563eb">'+((a.etfs||{}).pct||0)+'%</div><div class="a-type">ETFs</div><div class="a-dol">'+fmt((a.etfs||{}).dollar)+'</div></div>';
  h+='<div class="a-box"><div class="a-pct" style="color:#16a34a">'+((a.stocks||{}).pct||0)+'%</div><div class="a-type">Stocks</div><div class="a-dol">'+fmt((a.stocks||{}).dollar)+'</div></div>';
  h+='<div class="a-box"><div class="a-pct" style="color:#d97706">'+((a.options||{}).pct||0)+'%</div><div class="a-type">Options</div><div class="a-dol">'+fmt((a.options||{}).dollar)+'</div></div>';
  h+='</div>';

  h+='<div class="card">';
  h+='<div style="display:flex;justify-content:space-between;font-size:11px;font-weight:700;color:#475569"><span>Risk Score</span><span style="color:'+rc+';font-weight:900">'+rs+'/10</span></div>';
  h+='<div class="rbar"><div class="rbar-fill" style="width:'+(rs*10)+'%;background:'+rc+'"></div></div>';
  h+='<div class="mets">';
  h+='<div class="met"><div class="met-l">Target Return</div><div class="met-v" style="color:#16a34a">'+(p.targetReturn||'–')+'</div></div>';
  h+='<div class="met"><div class="met-l">Max Drawdown</div><div class="met-v" style="color:#dc2626">'+(p.maxDrawdown||'–')+'</div></div>';
  h+='<div class="met"><div class="met-l">Target Profit</div><div class="met-v" style="color:#16a34a">'+fmt(p.targetDollar)+'</div></div>';
  h+='<div class="met"><div class="met-l">Hedge Cushion</div><div class="met-v" style="color:#7c3aed">'+fmt((a.hedge||{}).dollar)+'</div></div>';
  h+='</div></div>';

  if((p.etfPositions||[]).length){h+='<div class="sec-hdr"><div class="sec-dot" style="background:#2563eb"></div><div class="sec-ttl" style="color:#2563eb">ETF Positions</div></div>';p.etfPositions.forEach(function(x){h+=posCard(x,'#2563eb','#2563eb','#dbeafe');});}
  if((p.stockPositions||[]).length){h+='<div class="sec-hdr"><div class="sec-dot" style="background:#16a34a"></div><div class="sec-ttl" style="color:#16a34a">Stock Positions</div></div>';p.stockPositions.forEach(function(x){h+=posCard(x,'#16a34a','#16a34a','#dcfce7');});}
  if((p.optionPositions||[]).length){h+='<div class="sec-hdr"><div class="sec-dot" style="background:#d97706"></div><div class="sec-ttl" style="color:#d97706">Options Positions</div></div>';p.optionPositions.forEach(function(x){var tc=x.action==='CALL'?'#d97706':'#dc2626';var bg=x.action==='CALL'?'#fef3c7':'#fee2e2';h+=posCard(x,'#d97706',tc,bg);});}
  if((p.hedgePositions||[]).length){h+='<div class="sec-hdr"><div class="sec-dot" style="background:#7c3aed"></div><div class="sec-ttl" style="color:#7c3aed">Hedge Positions</div></div>';p.hedgePositions.forEach(function(x){h+=posCard(x,'#7c3aed','#7c3aed','#ede9fe');});}

  if(p.weeklyThesis){var t=typeof p.weeklyThesis==='object'?JSON.stringify(p.weeklyThesis):String(p.weeklyThesis);h+='<div class="info-card"><span class="info-tag" style="background:#dbeafe;color:#2563eb">MACRO THESIS</span><div class="info-body">'+t+'</div></div>';}
  if(p.exitRules){var ex=typeof p.exitRules==='object'?Object.entries(p.exitRules).map(function(e){return'<b>'+e[0]+':</b> '+e[1]}).join(' · '):String(p.exitRules);h+='<div class="info-card"><span class="info-tag" style="background:#fef3c7;color:#d97706">EXIT RULES</span><div class="info-body">'+ex+'</div></div>';}

  document.getElementById('resultsBox').innerHTML=h;
  document.getElementById('resultsBox').style.display='block';
  document.getElementById('resultsBox').scrollIntoView({behavior:'smooth',block:'start'});
}
</script>
